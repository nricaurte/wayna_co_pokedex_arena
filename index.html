<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokédex Arena — Explorador RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== Pokédex Arena — original RPG-HUD aesthetic ===== */
:root{
  --bg-0:#070a14;
  --bg-1:#0c1120;
  --bg-2:#141a2e;
  --panel:#0f1527;
  --panel-2:#1a2140;
  --stroke:#1f2a4a;
  --stroke-2:#2a3868;
  --ink:#e6ecff;
  --ink-dim:#9aa6cc;
  --ink-faint:#6876a3;
  --accent:#6ae0ff;       /* electric cyan */
  --accent-2:#ff4da6;     /* magenta */
  --accent-3:#ffd23f;     /* amber */
  --good:#5ef2a3;
  --bad:#ff6a6a;
  --font-display:'Space Grotesk', system-ui, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, monospace;
  --font-body:'Inter', system-ui, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg-0);color:var(--ink);font-family:var(--font-body);min-height:100vh}
body{
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(106,224,255,0.10), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(255,77,166,0.08), transparent 60%),
    radial-gradient(700px 500px at 50% 110%, rgba(255,210,63,0.06), transparent 60%),
    var(--bg-0);
  overflow-x:hidden;
}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font-family:inherit}

/* Scanline overlay */
body.scanlines::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}

/* ===== Layout ===== */
.app{max-width:1440px;margin:0 auto;padding:24px 28px 120px;position:relative;z-index:1}

/* ===== Top bar ===== */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:10px 14px;border:1px solid var(--stroke);border-radius:14px;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.25)), var(--panel);
  box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 20px 40px -30px rgba(0,0,0,0.8);
}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;letter-spacing:0.02em}
.logo .dot{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #fff, var(--accent) 55%, #0b6ea3 100%);box-shadow:0 0 16px var(--accent)}
.logo .word{font-size:18px}
.logo .sub{font-family:var(--font-mono);font-size:10px;color:var(--ink-dim);letter-spacing:0.3em;text-transform:uppercase}

.topbar .sep{width:1px;height:22px;background:var(--stroke)}

.nav{display:flex;gap:4px}
.nav button{
  font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
  padding:8px 12px;border-radius:8px;color:var(--ink-dim);border:1px solid transparent;
}
.nav button.on{color:var(--ink);background:rgba(106,224,255,0.06);border-color:rgba(106,224,255,0.25);box-shadow:0 0 0 1px rgba(106,224,255,0.1) inset}
.nav button:hover{color:var(--ink)}

.topbar .spacer{flex:1}
.topbar .lang{
  font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
  padding:8px 10px;border-radius:8px;border:1px solid var(--stroke);color:var(--ink-dim);
  display:flex;gap:2px;
}
.topbar .lang b{color:var(--ink)}
.topbar .lang .segment{padding:4px 8px;border-radius:5px}
.topbar .lang .segment.on{background:rgba(106,224,255,0.1);color:var(--accent)}

/* ===== Hero ===== */
.hero{
  margin-top:22px;position:relative;border:1px solid var(--stroke);border-radius:22px;overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent 40%), var(--panel);
  min-height:440px;display:grid;grid-template-columns:1.15fr 1fr;gap:0;
}
.hero .hud-corners{position:absolute;inset:10px;pointer-events:none;z-index:3}
.hero .hud-corners::before,.hero .hud-corners::after{
  content:"";position:absolute;width:28px;height:28px;border:1.5px solid var(--accent);opacity:0.8;
}
.hero .hud-corners::before{left:0;top:0;border-right:none;border-bottom:none}
.hero .hud-corners::after{right:0;bottom:0;border-left:none;border-top:none}
.hero .hud-corners .c2,.hero .hud-corners .c3{position:absolute;width:28px;height:28px;border:1.5px solid var(--accent);opacity:0.8}
.hero .hud-corners .c2{right:0;top:0;border-left:none;border-bottom:none}
.hero .hud-corners .c3{left:0;bottom:0;border-right:none;border-top:none}

.hero-left{padding:44px 48px;display:flex;flex-direction:column;justify-content:space-between;gap:24px;position:relative;z-index:2}
.hero-kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:0.3em;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:10px}
.hero-kicker .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}

.hero h1{
  font-family:var(--font-display);font-weight:700;font-size:clamp(38px,5vw,64px);line-height:0.98;
  margin:14px 0 18px;letter-spacing:-0.02em;
}
.hero h1 .grad{
  background:linear-gradient(100deg, #fff 0%, var(--accent) 50%, var(--accent-2) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero p.lead{color:var(--ink-dim);font-size:15px;line-height:1.55;max-width:460px;margin:0}

.hero-stats{display:flex;gap:20px;margin-top:18px}
.hero-stats .chip{
  font-family:var(--font-mono);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;
  padding:10px 14px;border:1px solid var(--stroke-2);border-radius:10px;color:var(--ink-dim);
  display:flex;flex-direction:column;gap:4px;min-width:110px;
  background:linear-gradient(180deg, rgba(106,224,255,0.04), transparent);
}
.hero-stats .chip b{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--ink);letter-spacing:0}

.hero-right{position:relative;display:flex;align-items:center;justify-content:center;padding:24px;min-height:380px}
.hero-feature{
  position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;
}
.hero-feature .glow{
  position:absolute;width:380px;height:380px;border-radius:50%;
  background:radial-gradient(circle, rgba(106,224,255,0.35), transparent 60%);
  filter:blur(20px);
}
.hero-feature img{position:relative;width:78%;max-width:440px;filter:drop-shadow(0 30px 40px rgba(0,0,0,0.6))}
.hero-feature .rings{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.hero-feature .ring{position:absolute;border-radius:50%;border:1px dashed rgba(106,224,255,0.25)}
.hero-feature .ring.r1{width:340px;height:340px;animation:spin 40s linear infinite}
.hero-feature .ring.r2{width:440px;height:440px;border-style:solid;border-color:rgba(106,224,255,0.08)}
.hero-feature .ring.r3{width:540px;height:540px;border-color:rgba(255,77,166,0.12);animation:spin 60s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}

.hero-feature .info{
  position:absolute;left:24px;bottom:20px;font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);
  display:flex;flex-direction:column;gap:3px;
}
.hero-feature .info .no{color:var(--accent);font-size:12px;letter-spacing:0.2em}
.hero-feature .info .nm{font-family:var(--font-display);font-size:26px;color:var(--ink);text-transform:uppercase;letter-spacing:0.02em}

.hero-feature .cycle{
  position:absolute;right:20px;top:20px;display:flex;gap:6px;font-family:var(--font-mono);font-size:10px;color:var(--ink-dim);letter-spacing:0.2em;
}
.hero-feature .cycle button{
  width:30px;height:30px;border:1px solid var(--stroke-2);border-radius:6px;color:var(--ink-dim);
  display:flex;align-items:center;justify-content:center;
}
.hero-feature .cycle button:hover{color:var(--accent);border-color:var(--accent)}

/* ===== Controls row: search + filters ===== */
.controls{margin-top:20px;display:grid;grid-template-columns:1.2fr 2fr;gap:16px}
.search{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border:1px solid var(--stroke);border-radius:14px;background:var(--panel);
}
.search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(106,224,255,0.15)}
.search .icon{width:18px;height:18px;color:var(--ink-faint)}
.search input{
  flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-size:15px;
}
.search input::placeholder{color:var(--ink-faint)}
.search .kbd{
  font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;color:var(--ink-faint);
  padding:3px 6px;border:1px solid var(--stroke-2);border-radius:4px;
}

.type-filters{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 12px;
  border:1px solid var(--stroke);border-radius:14px;background:var(--panel);overflow-x:auto;
}
.type-chip{
  display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:999px;
  font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  border:1px solid transparent;color:var(--ink-dim);background:rgba(255,255,255,0.02);
  transition:transform .15s ease;
  white-space:nowrap;
}
.type-chip:hover{transform:translateY(-1px)}
.type-chip .sw{width:8px;height:8px;border-radius:50%}
.type-chip.on{color:var(--ink);border-color:currentColor;box-shadow:0 0 0 1px currentColor inset, 0 0 14px -4px currentColor}

/* ===== Grid ===== */
.grid-meta{display:flex;align-items:center;justify-content:space-between;margin:22px 4px 12px}
.grid-meta .count{font-family:var(--font-mono);font-size:11px;letter-spacing:0.2em;color:var(--ink-dim);text-transform:uppercase}
.grid-meta .sort{display:flex;gap:4px}
.grid-meta .sort button{
  font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  padding:6px 10px;border-radius:6px;color:var(--ink-dim);
}
.grid-meta .sort button.on{color:var(--ink);background:rgba(255,255,255,0.04)}

.grid{display:grid;gap:14px}
.grid.comfortable{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.grid.compact{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
.grid.dense{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}

/* ===== Card ===== */
.card{
  position:relative;border:1px solid var(--stroke);border-radius:16px;overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,0.03), transparent 40%), var(--panel);
  transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  cursor:pointer;isolation:isolate;
}
.card:hover{
  transform:translateY(-3px);
  border-color:var(--card-accent, var(--accent));
  box-shadow:0 18px 40px -20px rgba(0,0,0,0.9), 0 0 0 1px var(--card-accent, var(--accent)) inset, 0 0 30px -12px var(--card-accent, var(--accent));
}
.card .bg{
  position:absolute;inset:0;z-index:0;opacity:0.25;
  background:radial-gradient(120% 80% at 50% 0%, var(--card-accent, var(--accent)) 0%, transparent 55%);
}
.card .stripe{
  position:absolute;left:0;right:0;top:0;height:3px;background:var(--card-accent, var(--accent));opacity:0.9;
}
.card .no{
  position:absolute;left:12px;top:10px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;color:var(--ink-faint);
}
.card .spark{
  position:absolute;right:12px;top:10px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--card-accent, var(--accent));text-transform:uppercase;
}
.card .art{
  position:relative;z-index:1;width:100%;aspect-ratio:1/1;display:flex;align-items:flex-end;justify-content:center;padding:22px 12px 6px;
}
.card .art img{width:86%;filter:drop-shadow(0 10px 14px rgba(0,0,0,0.6));transition:transform .25s ease}
.card:hover .art img{transform:translateY(-4px) scale(1.04)}
.card .body{position:relative;z-index:1;padding:6px 14px 14px}
.card .name{
  font-family:var(--font-display);font-weight:600;font-size:16px;text-transform:capitalize;letter-spacing:-0.01em;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}
.card .types{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.card .t{
  font-family:var(--font-mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  padding:3px 7px;border-radius:4px;color:var(--ink);
}
.card .mini{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;
  font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;color:var(--ink-faint);text-transform:uppercase;
}
.card .mini div b{display:block;font-family:var(--font-display);font-size:13px;color:var(--ink);letter-spacing:0;margin-top:2px}

.grid.compact .card .body{padding:4px 10px 10px}
.grid.compact .card .name{font-size:13px}
.grid.compact .card .mini{display:none}
.grid.dense .card .body{padding:2px 8px 8px}
.grid.dense .card .name{font-size:11px}
.grid.dense .card .types{display:none}
.grid.dense .card .mini{display:none}

/* ===== Loader cards ===== */
.skeleton{
  position:relative;border:1px solid var(--stroke);border-radius:16px;overflow:hidden;height:260px;
  background:linear-gradient(90deg, var(--panel) 0%, var(--panel-2) 40%, var(--panel) 80%);
  background-size:200% 100%;animation:shimmer 1.4s infinite linear;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ===== Detail modal ===== */
.scrim{
  position:fixed;inset:0;background:rgba(3,6,16,0.78);backdrop-filter:blur(6px);
  z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  width:min(1100px, 100%);max-height:92vh;overflow:auto;
  border:1px solid var(--stroke-2);border-radius:20px;background:var(--panel);
  box-shadow:0 40px 80px -20px rgba(0,0,0,0.8);
  animation:rise .25s ease;
}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-head{
  position:relative;padding:28px 32px 18px;border-bottom:1px solid var(--stroke);
  background:linear-gradient(180deg, color-mix(in oklab, var(--card-accent, var(--accent)) 18%, transparent), transparent);
  display:grid;grid-template-columns:1.2fr 1fr;gap:24px;align-items:center;
}
.modal-head .close{
  position:absolute;right:18px;top:18px;width:36px;height:36px;border:1px solid var(--stroke-2);border-radius:8px;
  color:var(--ink-dim);display:flex;align-items:center;justify-content:center;
}
.modal-head .close:hover{color:var(--ink);border-color:var(--accent)}

.modal-head .title .no{font-family:var(--font-mono);font-size:12px;letter-spacing:0.3em;color:var(--card-accent, var(--accent));text-transform:uppercase}
.modal-head .title h2{font-family:var(--font-display);font-weight:700;font-size:48px;text-transform:capitalize;margin:6px 0 10px;letter-spacing:-0.02em}
.modal-head .title .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;color:var(--ink-dim);text-transform:uppercase;display:flex;gap:14px}
.modal-head .title .types{display:flex;gap:8px;margin-top:14px}
.modal-head .title .t{padding:6px 12px;border-radius:8px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase}

.modal-head .art{position:relative;height:260px;display:flex;align-items:center;justify-content:center}
.modal-head .art .glow{position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, color-mix(in oklab, var(--card-accent, var(--accent)) 55%, transparent), transparent 65%);filter:blur(12px)}
.modal-head .art img{position:relative;height:100%;filter:drop-shadow(0 20px 28px rgba(0,0,0,0.6))}

.modal-body{padding:24px 32px 32px;display:grid;grid-template-columns:1.1fr 1fr;gap:28px}
.section-title{
  font-family:var(--font-mono);font-size:10px;letter-spacing:0.3em;color:var(--ink-dim);text-transform:uppercase;
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.section-title::before{content:"";width:14px;height:1px;background:var(--card-accent, var(--accent));box-shadow:0 0 8px var(--card-accent, var(--accent))}

/* Stats bars */
.stats{display:flex;flex-direction:column;gap:10px}
.stat{display:grid;grid-template-columns:120px 42px 1fr;gap:12px;align-items:center;font-family:var(--font-mono);font-size:11px}
.stat .label{color:var(--ink-dim);letter-spacing:0.15em;text-transform:uppercase}
.stat .val{color:var(--ink);font-weight:700;font-size:13px;text-align:right}
.stat .bar{height:10px;background:rgba(255,255,255,0.04);border-radius:6px;overflow:hidden;position:relative}
.stat .fill{
  height:100%;width:0;border-radius:6px;
  background:linear-gradient(90deg, var(--card-accent, var(--accent)), color-mix(in oklab, var(--card-accent, var(--accent)) 50%, #ffffff));
  transition:width 1.2s cubic-bezier(.2,.8,.2,1);
  box-shadow:0 0 16px -4px var(--card-accent, var(--accent));
  position:relative;
}
.stat .fill::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.35) 80%, transparent 100%);
  animation:sheen 2s infinite;
}
@keyframes sheen{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* Radar */
.radar-wrap{position:relative;aspect-ratio:1/1;max-width:380px;margin:0 auto;width:100%}
.radar-wrap svg{width:100%;height:100%;display:block}

/* Abilities + moves */
.ability{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--stroke);border-radius:10px;
  background:rgba(255,255,255,0.02);margin-bottom:8px;
}
.ability .ix{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);letter-spacing:0.2em}
.ability .nm{font-family:var(--font-display);font-weight:600;font-size:14px;text-transform:capitalize}
.ability.hidden-a .nm::after{content:" · HIDDEN";font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;color:var(--accent-2);margin-left:4px}

.moves{display:grid;grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));gap:6px;max-height:220px;overflow:auto;padding-right:4px}
.move{
  font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
  padding:7px 10px;border:1px solid var(--stroke);border-radius:6px;color:var(--ink-dim);
  background:rgba(255,255,255,0.02);
}
.moves::-webkit-scrollbar{width:6px}
.moves::-webkit-scrollbar-thumb{background:var(--stroke-2);border-radius:3px}

/* Evolution */
.evo{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.evo .node{
  display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border:1px solid var(--stroke);border-radius:12px;
  background:rgba(255,255,255,0.02);min-width:90px;cursor:pointer;transition:all .15s;
}
.evo .node:hover{border-color:var(--card-accent, var(--accent))}
.evo .node img{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 6px 8px rgba(0,0,0,0.5))}
.evo .node .n{font-family:var(--font-display);font-size:12px;text-transform:capitalize}
.evo .node .lv{font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;color:var(--ink-faint);text-transform:uppercase}
.evo .arrow{font-family:var(--font-mono);color:var(--accent);font-size:18px}

/* ===== Compare view ===== */
.compare{margin-top:10px;display:grid;grid-template-columns:1fr 60px 1fr;gap:18px;align-items:start}
.compare .vs{
  font-family:var(--font-display);font-weight:700;font-size:28px;text-align:center;color:var(--ink-faint);
  padding-top:140px;
}
.compare .slot{
  border:1px solid var(--stroke);border-radius:18px;background:var(--panel);padding:22px;min-height:400px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.compare .slot.empty{justify-content:center;color:var(--ink-faint);font-family:var(--font-mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase}
.compare .slot .picker{display:flex;gap:6px;align-items:center;font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-dim)}
.compare .slot .picker input{
  background:var(--bg-1);border:1px solid var(--stroke-2);border-radius:8px;padding:8px 10px;color:var(--ink);
  width:160px;outline:none;
}
.compare .slot .picker input:focus{border-color:var(--accent)}
.compare .slot .art{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;margin-top:6px}
.compare .slot .art .glow{position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle, color-mix(in oklab, var(--card-accent, var(--accent)) 40%, transparent), transparent 65%);filter:blur(10px)}
.compare .slot .art img{position:relative;height:100%;filter:drop-shadow(0 14px 22px rgba(0,0,0,0.5))}
.compare .slot h3{font-family:var(--font-display);font-weight:700;font-size:24px;margin:4px 0 0;text-transform:capitalize}
.compare .slot .types{display:flex;gap:6px}
.compare .slot .mini-stats{width:100%;margin-top:8px}

/* ===== Tweaks panel ===== */
.tweaks-btn{
  position:fixed;right:22px;bottom:22px;z-index:60;
  padding:12px 16px;border-radius:12px;border:1px solid var(--stroke-2);
  background:var(--panel);color:var(--ink-dim);font-family:var(--font-mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;
  display:none;align-items:center;gap:8px;
  box-shadow:0 10px 30px -10px rgba(0,0,0,0.8);
}
.tweaks-btn.visible{display:inline-flex}
.tweaks-btn:hover{border-color:var(--accent);color:var(--ink)}
.tweaks-panel{
  position:fixed;right:22px;bottom:80px;z-index:61;width:320px;
  border:1px solid var(--stroke-2);border-radius:16px;background:var(--panel);
  box-shadow:0 30px 60px -20px rgba(0,0,0,0.9);padding:18px;
  display:flex;flex-direction:column;gap:14px;
}
.tweaks-panel h4{margin:0 0 2px;font-family:var(--font-display);font-size:14px;letter-spacing:0.02em}
.tweaks-panel .row{display:flex;flex-direction:column;gap:6px}
.tweaks-panel label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;color:var(--ink-dim);text-transform:uppercase}
.tweaks-panel .seg{display:flex;gap:4px;border:1px solid var(--stroke);border-radius:10px;padding:3px;background:rgba(0,0,0,0.25)}
.tweaks-panel .seg button{
  flex:1;padding:8px;border-radius:7px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-dim);
}
.tweaks-panel .seg button.on{background:rgba(106,224,255,0.1);color:var(--accent)}
.tweaks-panel .tog{display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.15em}
.tweaks-panel .tog .sw{
  width:36px;height:20px;border-radius:999px;background:var(--stroke-2);position:relative;transition:background .15s;
}
.tweaks-panel .tog .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .15s}
.tweaks-panel .tog.on .sw{background:var(--accent)}
.tweaks-panel .tog.on .sw::after{transform:translateX(16px)}

/* ===== Theme: Arcade ===== */
body.theme-arcade{
  --bg-0:#140416;--bg-1:#1c0520;--panel:#2a0a2e;--panel-2:#3a0f42;
  --stroke:#4a1354;--stroke-2:#6a1e78;
  --accent:#ffe93a;--accent-2:#ff3d6e;--accent-3:#22d3ee;
  --ink:#fff4d6;--ink-dim:#d9a6e0;--ink-faint:#8f5a99;
  --font-display:'Space Grotesk',sans-serif;
}
body.theme-arcade{
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 20px),
    radial-gradient(900px 500px at 10% 0%, rgba(255,61,110,0.15), transparent 60%),
    radial-gradient(900px 500px at 90% 100%, rgba(255,233,58,0.08), transparent 60%),
    var(--bg-0);
}
body.theme-arcade h1{text-shadow:0 0 20px rgba(255,233,58,0.3)}

/* ===== Theme: Holo ===== */
body.theme-holo{
  --bg-0:#0a0b14;--bg-1:#12131f;--panel:#1b1d2e;--panel-2:#262a42;
  --stroke:#2d334f;--stroke-2:#434a70;
  --accent:#c3a2ff;--accent-2:#7fffd4;--accent-3:#ffb3e6;
  --ink:#f5f0ff;--ink-dim:#b4aad0;--ink-faint:#736c90;
}
body.theme-holo .card,body.theme-holo .hero,body.theme-holo .modal{
  background:
    linear-gradient(135deg, rgba(195,162,255,0.06), rgba(127,255,212,0.04) 50%, rgba(255,179,230,0.06)),
    var(--panel);
}
body.theme-holo .card:hover{
  background:
    linear-gradient(135deg, rgba(195,162,255,0.14), rgba(127,255,212,0.08) 50%, rgba(255,179,230,0.14)),
    var(--panel);
}

/* ===== Battle arena ===== */
.battle{
  width:min(1200px,100%);max-height:95vh;overflow:hidden;
  border:1px solid var(--stroke-2);border-radius:20px;background:var(--panel);
  box-shadow:0 40px 80px -20px rgba(0,0,0,0.9);
  display:flex;flex-direction:column;animation:rise .25s ease;position:relative;
}
.battle-close{position:absolute;right:18px;top:18px;z-index:10;width:36px;height:36px;border:1px solid var(--stroke-2);border-radius:8px;color:var(--ink-dim);display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4)}
.battle-close:hover{color:var(--ink);border-color:var(--accent)}

.stage{
  position:relative;height:440px;overflow:hidden;
  background:linear-gradient(180deg,#1a1e3a 0%,#0c0f1e 100%);
  border-bottom:1px solid var(--stroke-2);
}
.stage-bg{position:absolute;inset:0;overflow:hidden}
.stage-grid{
  position:absolute;left:-20%;right:-20%;bottom:-10%;height:60%;
  background:
    linear-gradient(to right, rgba(106,224,255,0.12) 1px, transparent 1px) 0 0/60px 60px,
    linear-gradient(to bottom, rgba(106,224,255,0.12) 1px, transparent 1px) 0 0/60px 60px,
    radial-gradient(ellipse at 50% 100%, rgba(106,224,255,0.22), transparent 70%);
  transform:perspective(500px) rotateX(62deg);
  transform-origin:bottom;
}
.stage-sun{
  position:absolute;left:50%;top:18%;transform:translateX(-50%);
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle, rgba(255,77,166,0.55), rgba(106,224,255,0.15) 50%, transparent 70%);
  filter:blur(8px);
}

.fighter{position:absolute;display:flex;align-items:flex-end;gap:16px;transition:transform .15s}
.fighter.enemy{top:24px;right:32px;flex-direction:row-reverse}
.fighter.player{bottom:24px;left:32px}
.fighter.shake{animation:shake 0.4s}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-14px) rotate(-2deg)}
  40%{transform:translateX(12px) rotate(2deg)}
  60%{transform:translateX(-8px)}
  80%{transform:translateX(6px)}
}
.fighter.flash .sprite-wrap img{animation:flash 0.4s}
@keyframes flash{
  0%,100%{filter:drop-shadow(0 10px 14px rgba(0,0,0,0.5))}
  40%{filter:drop-shadow(0 0 30px #fff) brightness(3) saturate(0)}
}

/* Lunge: attacker leans toward opponent */
.fighter.player.lunge{animation:lunge-p 0.42s cubic-bezier(.34,1.56,.64,1)}
.fighter.enemy.lunge{animation:lunge-e 0.42s cubic-bezier(.34,1.56,.64,1)}
@keyframes lunge-p{
  0%,100%{transform:translate(0,0)}
  45%{transform:translate(120px,-80px) rotate(-6deg)}
}
@keyframes lunge-e{
  0%,100%{transform:translate(0,0)}
  45%{transform:translate(-120px,80px) rotate(-6deg)}
}

/* Projectile: bolt traveling between fighters */
.projectile{
  position:absolute;
  width:70px;height:28px;
  pointer-events:none;
  z-index:5;
  transform-origin:center;
}
.projectile.from-a{
  animation:proj-a .62s cubic-bezier(.5,0,.9,.5) forwards;
  left:180px;bottom:160px;
}
.projectile.from-b{
  animation:proj-b .62s cubic-bezier(.5,0,.9,.5) forwards;
  right:180px;top:160px;
  transform:scaleX(-1);
}
@keyframes proj-a{
  0%{transform:translate(0,0) scale(.4) rotate(-18deg);opacity:0}
  15%{opacity:1}
  100%{transform:translate(440px,-260px) scale(1) rotate(-18deg);opacity:1}
}
@keyframes proj-b{
  0%{transform:scaleX(-1) translate(0,0) scale(.4) rotate(-18deg);opacity:0}
  15%{opacity:1}
  100%{transform:scaleX(-1) translate(440px,-260px) scale(1) rotate(-18deg);opacity:1}
}
.projectile .p-core{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 75% 50%, #fff 0%, var(--pc) 35%, transparent 75%);
  border-radius:50%;
  filter:blur(.5px) drop-shadow(0 0 10px var(--pc));
}
.projectile .p-trail{
  position:absolute;top:50%;left:0;width:90%;height:4px;
  transform:translateY(-50%);
  background:linear-gradient(90deg, transparent, var(--pc));
  filter:blur(2px);
  opacity:.85;
}
.projectile .p-glow{
  position:absolute;inset:-20px;
  background:radial-gradient(circle, var(--pc) 0%, transparent 55%);
  opacity:.5;
  filter:blur(8px);
}

/* Impact: burst on defender */
.impact{
  position:absolute;
  width:240px;height:240px;
  pointer-events:none;
  z-index:6;
  animation:imp-pop .5s ease-out forwards;
}
.impact.side-a{left:60px;bottom:90px}
.impact.side-b{right:60px;top:90px}
@keyframes imp-pop{
  0%{transform:scale(.2);opacity:0}
  30%{opacity:1}
  100%{transform:scale(1.2);opacity:0}
}
.impact .imp-ring{
  position:absolute;inset:30%;
  border-radius:50%;
  border:4px solid var(--ic);
  box-shadow:0 0 24px var(--ic), inset 0 0 24px var(--ic);
  animation:imp-ring .5s ease-out forwards;
}
.impact .imp-ring-2{
  animation-delay:.08s;
  border-color:#fff;
  opacity:.8;
}
@keyframes imp-ring{
  0%{transform:scale(.3);opacity:1}
  100%{transform:scale(2.2);opacity:0}
}
.impact .imp-star{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:120px;color:#fff;
  text-shadow:0 0 24px var(--ic),0 0 50px var(--ic);
  animation:imp-star .45s ease-out forwards;
}
@keyframes imp-star{
  0%{transform:scale(.3) rotate(0);opacity:0}
  40%{transform:scale(1.3) rotate(60deg);opacity:1}
  100%{transform:scale(1.8) rotate(120deg);opacity:0}
}
.impact .imp-spikes{position:absolute;inset:0}
.impact .imp-spikes span{
  position:absolute;top:50%;left:50%;
  width:70px;height:6px;
  background:linear-gradient(90deg, var(--ic), transparent);
  transform-origin:0 50%;
  filter:drop-shadow(0 0 6px var(--ic));
  animation:imp-spike .45s ease-out forwards;
}
.impact .imp-spikes span:nth-child(1){transform:rotate(0deg)}
.impact .imp-spikes span:nth-child(2){transform:rotate(45deg)}
.impact .imp-spikes span:nth-child(3){transform:rotate(90deg)}
.impact .imp-spikes span:nth-child(4){transform:rotate(135deg)}
.impact .imp-spikes span:nth-child(5){transform:rotate(180deg)}
.impact .imp-spikes span:nth-child(6){transform:rotate(225deg)}
.impact .imp-spikes span:nth-child(7){transform:rotate(270deg)}
.impact .imp-spikes span:nth-child(8){transform:rotate(315deg)}
@keyframes imp-spike{
  0%{width:0;opacity:0}
  40%{width:90px;opacity:1}
  100%{width:140px;opacity:0}
}

/* Damage popup */
.dmg-pop{
  position:absolute;
  z-index:7;
  pointer-events:none;
  display:flex;flex-direction:column;align-items:center;
  font-family:"Space Grotesk",sans-serif;
  font-weight:800;
  animation:dmg-rise .9s cubic-bezier(.2,.8,.3,1) forwards;
}
.dmg-pop.side-a{left:130px;bottom:220px}
.dmg-pop.side-b{right:130px;top:220px}
.dmg-pop .dp-num{
  font-size:56px;
  color:#fff;
  text-shadow:0 3px 0 #000,0 0 20px rgba(255,255,255,.4);
  letter-spacing:-1px;
}
.dmg-pop.super .dp-num{color:#ffd23f;text-shadow:0 3px 0 #4a2c00,0 0 24px #ffd23f}
.dmg-pop.weak .dp-num{color:#9aa3b2;font-size:38px}
.dmg-pop.crit .dp-num{color:#ff4da6;font-size:72px;text-shadow:0 3px 0 #4a0022,0 0 28px #ff4da6}
.dmg-pop .dp-crit{
  font-size:14px;
  color:#ff4da6;
  letter-spacing:3px;
  margin-top:2px;
  text-shadow:0 0 8px #ff4da6;
}
@keyframes dmg-rise{
  0%{transform:translateY(20px) scale(.3);opacity:0}
  20%{transform:translateY(0) scale(1.2);opacity:1}
  35%{transform:translateY(-6px) scale(1);opacity:1}
  100%{transform:translateY(-80px) scale(.9);opacity:0}
}

.sprite-wrap{position:relative;width:200px;height:200px;display:flex;align-items:flex-end;justify-content:center}
.fighter.enemy .sprite-wrap{width:180px;height:180px}
.sprite-wrap .shadow{
  position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
  width:70%;height:14px;border-radius:50%;
  background:radial-gradient(ellipse, rgba(0,0,0,0.55), transparent 70%);
  filter:blur(3px);
}
.sprite-wrap img{
  position:relative;width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 10px 14px rgba(0,0,0,0.5));
  animation:float 2.4s ease-in-out infinite;
}
.fighter.enemy .sprite-wrap img{animation-delay:-1.2s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.name-plate{
  min-width:260px;padding:12px 14px;border-radius:10px;
  border:1px solid var(--stroke-2);background:rgba(8,11,24,0.85);backdrop-filter:blur(4px);
  box-shadow:0 8px 20px -8px rgba(0,0,0,0.8), 0 0 0 1px var(--accent, #6ae0ff)22 inset;
}
.np-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px}
.np-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;text-transform:capitalize;color:#fff}
.np-lv{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);letter-spacing:0.15em}
.np-types{display:flex;gap:5px;margin-top:6px}
.np-types span{padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase}

.hp-bar{display:flex;align-items:center;gap:8px}
.hp-track{flex:1;height:10px;border-radius:6px;background:rgba(255,255,255,0.08);overflow:hidden;border:1px solid rgba(255,255,255,0.05)}
.hp-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 8px -2px currentColor}
.hp-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink);font-weight:700;min-width:64px;text-align:right}
.hp-num span{color:var(--ink-faint);font-weight:400}

/* Victory */
.victory{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:5;animation:fadeIn .3s}
.victory-inner{text-align:center;padding:30px 40px;border-radius:20px;border:1px solid var(--accent);background:rgba(15,21,39,0.95);box-shadow:0 0 40px -8px var(--accent)}
.v-kicker{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.4em;color:var(--accent);margin-bottom:10px}
.victory-inner img{width:140px;height:140px;object-fit:contain;filter:drop-shadow(0 0 20px var(--accent))}
.v-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:32px;text-transform:capitalize;margin:6px 0 2px}
.v-xp{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent-3);letter-spacing:0.2em;margin-bottom:16px}
.v-again{padding:10px 18px;border-radius:8px;border:1px solid var(--accent);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;background:rgba(106,224,255,0.08)}
.v-again:hover{background:var(--accent);color:#0a0e1a}

/* Console */
.console{display:grid;grid-template-columns:1fr 1.3fr;gap:0;height:220px}
.log{padding:14px 18px;overflow:auto;border-right:1px solid var(--stroke);display:flex;flex-direction:column;gap:5px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.45}
.log-line{color:var(--ink-dim);animation:logIn .25s ease}
@keyframes logIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.log-line.k-start{color:var(--accent);font-weight:700;letter-spacing:0.08em}
.log-line.k-move{color:var(--ink)}
.log-line.k-crit{color:var(--accent-3);font-weight:700}
.log-line.k-super{color:#5ef2a3}
.log-line.k-weak{color:var(--ink-faint)}
.log-line.k-miss{color:var(--ink-faint);font-style:italic}
.log-line.k-faint{color:#ff6a6a;font-weight:700}
.log-line.k-win{color:var(--accent);font-weight:700;letter-spacing:0.1em;font-size:13px}

.moves-panel{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.mp-title{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;color:var(--ink-dim);text-transform:uppercase}
.move-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1}
.move-btn{
  padding:10px 12px;border-radius:10px;border:1px solid var(--stroke-2);background:rgba(255,255,255,0.02);
  display:flex;flex-direction:column;gap:6px;text-align:left;transition:all .15s;cursor:pointer;
}
.move-btn:hover:not(:disabled){border-color:var(--mc);box-shadow:0 0 0 1px var(--mc) inset, 0 0 20px -6px var(--mc);transform:translateY(-1px)}
.move-btn:disabled{opacity:0.45;cursor:not-allowed}
.mb-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.mb-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;text-transform:capitalize;color:#fff}
.mb-type{padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase}
.mb-bot{display:flex;gap:10px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;color:var(--ink-faint);text-transform:uppercase}
.mb-cat{margin-left:auto;color:var(--mc)}

/* Fight CTA */
.fight-cta{
  margin-top:20px;display:flex;justify-content:center;
}
.fight-btn{
  padding:16px 40px;border-radius:14px;
  border:1px solid #ff4da6;color:#fff;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;letter-spacing:0.3em;
  background:linear-gradient(135deg, rgba(255,77,166,0.25), rgba(106,224,255,0.15));
  box-shadow:0 0 0 1px rgba(255,77,166,0.4) inset, 0 10px 30px -8px #ff4da6, 0 0 40px -10px #6ae0ff;
  cursor:pointer;transition:transform .15s;
}
.fight-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 0 1px #ff4da6 inset, 0 14px 40px -8px #ff4da6, 0 0 60px -8px #6ae0ff}
.fight-btn .fb-icon{margin-right:10px}

/* Responsive */
@media (max-width: 960px){
  .console{grid-template-columns:1fr;height:auto}
  .move-grid{grid-template-columns:1fr 1fr}
  .stage{height:360px}
  .sprite-wrap{width:140px;height:140px}
  .fighter.enemy .sprite-wrap{width:120px;height:120px}
  .name-plate{min-width:200px}
  .hero{grid-template-columns:1fr}
  .controls{grid-template-columns:1fr}
  .modal-head,.modal-body{grid-template-columns:1fr}
  .compare{grid-template-columns:1fr;gap:10px}
  .compare .vs{padding:0;transform:rotate(90deg)}
}

</style>

<script type="text/babel">
// i18n — ES/EN strings
const I18N = {

<script type="text/babel">
// PokéAPI data layer with in-memory cache + localStorage persistence
const API = "https://pokeapi.co/api/v2";
const CACHE_KEY = "pokedex_arena_cache_v1";

function loadCache(){
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || "{}"); } catch(e){ return {}; }
}
function saveCache(c){
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(c)); } catch(e){}
}
const cache = loadCache();
let saveTimer = null;
function schedSave(){ clearTimeout(saveTimer); saveTimer = setTimeout(()=>saveCache(cache), 500); }

async function cachedFetch(url){
  if (cache[url]) return cache[url];
  const r = await fetch(url);
  if (!r.ok) throw new Error("fetch failed: "+url);
  const j = await r.json();
  cache[url] = j;
  schedSave();
  return j;
}

// Compact pokemon summary for grid
function extractSummary(p){
  const stats = {};
  (p.stats || []).forEach(s => stats[s.stat.name] = s.base_stat);
  return {
    id: p.id,
    name: p.name,
    types: p.types.map(t => t.type.name),
    height: p.height,
    weight: p.weight,
    base_experience: p.base_experience,
    abilities: p.abilities.map(a => ({ name: a.ability.name, hidden: a.is_hidden })),
    moves: p.moves.slice(0, 24).map(m => m.move.name),
    stats,
    sprite: p.sprites?.other?.["official-artwork"]?.front_default 
         || p.sprites?.front_default
         || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`,
    spriteSmall: p.sprites?.front_default || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`,
  };
}

async function getPokemon(idOrName){
  const data = await cachedFetch(`${API}/pokemon/${idOrName}`);
  return extractSummary(data);
}

async function getSpecies(id){
  return cachedFetch(`${API}/pokemon-species/${id}`);
}

async function getEvolutionChain(url){
  return cachedFetch(url);
}

// Resolve full evolution chain -> list of {name, id, trigger, details}
function flattenChain(chainNode, results=[]){
  const name = chainNode.species.name;
  const id = parseInt(chainNode.species.url.split("/").filter(Boolean).pop(), 10);
  const details = chainNode.evolution_details?.[0];
  results.push({
    name, id,
    trigger: details?.trigger?.name,
    minLevel: details?.min_level,
    item: details?.item?.name,
  });
  (chainNode.evolves_to || []).forEach(c => flattenChain(c, results));
  return results;
}

async function getEvolutionForPokemon(id){
  try {
    const species = await getSpecies(id);
    if (!species?.evolution_chain?.url) return [];
    const ec = await getEvolutionChain(species.evolution_chain.url);
    return flattenChain(ec.chain);
  } catch(e){ return []; }
}

// Pre-load a set of pokemon with concurrency cap
async function loadBatch(ids, concurrency=10, onProgress){
  const results = new Array(ids.length);
  let completed = 0, idx = 0;
  async function worker(){
    while (idx < ids.length){
      const i = idx++;
      try { results[i] = await getPokemon(ids[i]); }
      catch(e){ results[i] = null; }
      completed++;
      onProgress?.(completed, ids.length);
    }
  }
  const workers = Array.from({length:concurrency}, worker);
  await Promise.all(workers);
  return results.filter(Boolean);
}

window.PokeAPI = { getPokemon, getEvolutionForPokemon, loadBatch };

</script>
<script type="text/babel">
// Hex radar chart for 6 base stats. Animated fill on mount.
const { useMemo, useState, useEffect, useRef } = React;

function HexRadar({ stats, accent, labels }){
  // stats: { hp, attack, defense, 'special-attack', 'special-defense', speed }
  const statKeys = ["hp","attack","defense","special-attack","special-defense","speed"];
  const lblKeys  = ["hp","atk","def","spa","spd","spe"];
  const values = statKeys.map(k => stats[k] ?? 0);
  const MAX = 160; // normalize; MAX stat in Gen 1 ~180

  const cx = 200, cy = 200, R = 140;
  const angleFor = i => (Math.PI * 2 * i / 6) - Math.PI/2;

  // Rings
  const rings = [0.25, 0.5, 0.75, 1].map(f => {
    const pts = Array.from({length:6}, (_,i) => {
      const a = angleFor(i);
      return [cx + Math.cos(a)*R*f, cy + Math.sin(a)*R*f];
    });
    return pts.map(p=>p.join(",")).join(" ");
  });

  // Axes
  const axes = Array.from({length:6}, (_,i) => {
    const a = angleFor(i);
    return { x1:cx, y1:cy, x2:cx+Math.cos(a)*R, y2:cy+Math.sin(a)*R };
  });

  // Animated poly
  const [anim, setAnim] = useState(0);
  useEffect(()=>{
    setAnim(0);
    const t = setTimeout(()=>setAnim(1), 50);
    return ()=>clearTimeout(t);
  }, [values.join(",")]);

  const polyPts = values.map((v,i) => {
    const a = angleFor(i);
    const r = R * Math.min(1, v / MAX) * anim;
    return [cx + Math.cos(a)*r, cy + Math.sin(a)*r];
  });
  const polyStr = polyPts.map(p=>p.join(",")).join(" ");

  // Value dots
  const dots = polyPts.map((p,i)=>({x:p[0],y:p[1],v:values[i]}));

  // Labels
  const labelNodes = Array.from({length:6}, (_,i) => {
    const a = angleFor(i);
    const lx = cx + Math.cos(a)*(R+28);
    const ly = cy + Math.sin(a)*(R+28);
    return { x:lx, y:ly, t: labels[lblKeys[i]], v: values[i] };
  });

  return (
    <div className="radar-wrap">
      <svg viewBox="0 0 400 400">
        <defs>
          <radialGradient id="radarFill" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stopColor={accent} stopOpacity="0.55"/>
            <stop offset="100%" stopColor={accent} stopOpacity="0.08"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        {/* Rings */}
        {rings.map((pts, i) => (
          <polygon key={i} points={pts}
            fill={i===rings.length-1 ? "rgba(255,255,255,0.015)" : "none"}
            stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>
        ))}
        {/* Axes */}
        {axes.map((a, i) => (
          <line key={i} x1={a.x1} y1={a.y1} x2={a.x2} y2={a.y2}
            stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>
        ))}

        {/* Filled area */}
        <polygon points={polyStr} fill="url(#radarFill)" stroke={accent} strokeWidth="2"
          style={{transition:"all 1s cubic-bezier(.2,.8,.2,1)", filter:"url(#glow)"}}/>

        {/* Dots */}
        {dots.map((d,i) => (
          <g key={i} style={{transition:"all 1s cubic-bezier(.2,.8,.2,1)"}}>
            <circle cx={d.x} cy={d.y} r="4" fill={accent} stroke="#fff" strokeWidth="1.5"/>
          </g>
        ))}

        {/* Tick values on top ring */}
        {[40,80,120,160].map((val, idx) => (
          <text key={val} x={cx+3} y={cy - R*(val/MAX) - 4} fontSize="9" fill="rgba(255,255,255,0.3)"
            fontFamily="JetBrains Mono, monospace" letterSpacing="0.1em">{val}</text>
        ))}

        {/* Labels */}
        {labelNodes.map((l,i) => (
          <g key={i}>
            <text x={l.x} y={l.y-2} fontSize="10" fontFamily="JetBrains Mono, monospace"
              letterSpacing="0.15em" fill="rgba(255,255,255,0.55)" textAnchor="middle"
              style={{textTransform:"uppercase"}}>{l.t}</text>
            <text x={l.x} y={l.y+12} fontSize="13" fontFamily="Space Grotesk, sans-serif"
              fontWeight="700" fill="#fff" textAnchor="middle">{l.v}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

window.HexRadar = HexRadar;

</script>
