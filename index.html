    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(52, 16/9, 0.1, 200);
    camera.position.set(0, 5, 8);
    camera.lookAt(0, 1, 0);

    const hemi = new THREE.HemisphereLight(0xbfd5f0, 0x2a2a2a, 0.6);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xfff4d6, 1.2);
    sun.position.set(18, 28, 12);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -28;
    sun.shadow.camera.right = 28;
    sun.shadow.camera.top = 28;
    sun.shadow.camera.bottom = -28;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 90;
    sun.shadow.bias = -0.0008;
    scene.add(sun);
    const rim = new THREE.DirectionalLight(0x6ae0ff, 0.35);
    rim.position.set(-10, 8, -8);
    scene.add(rim);

    // Player
    const playerGroup = new THREE.Group();
    const bodyMat = new THREE.MeshToonMaterial({ color: 0x6ae0ff, gradientMap: toonGrad });
    const skinMat = new THREE.MeshToonMaterial({ color: 0xffd8a8, gradientMap: toonGrad });
    const capMat = new THREE.MeshToonMaterial({ color: 0xff4da6, gradientMap: toonGrad });
    const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.45, 4, 10), bodyMat);
    body.position.y = 0.6; body.castShadow = true; playerGroup.add(body);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.24, 20, 14), skinMat);
    head.position.y = 1.2; head.castShadow = true; playerGroup.add(head);
    const cap = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.2, 16), capMat);
    cap.position.y = 1.42; cap.castShadow = true; playerGroup.add(cap);
    const capBrim = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.04, 16), capMat);
    capBrim.position.set(0, 1.32, 0.18);
    capBrim.rotation.x = 0.25;
    playerGroup.add(capBrim);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x1a1e2e });
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 6), eyeMat);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 6), eyeMat);
    eyeL.position.set(-0.08, 1.22, 0.22);
    eyeR.position.set(0.08, 1.22, 0.22);
    playerGroup.add(eyeL); playerGroup.add(eyeR);
    // Shadow disc under player (fallback when real shadow is occluded)
    const shadowDisc = new THREE.Mesh(
      new THREE.CircleGeometry(0.4, 24),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
    );
    shadowDisc.rotation.x = -Math.PI / 2;
    shadowDisc.position.y = 0.02;
    playerGroup.add(shadowDisc);
    scene.add(playerGroup);

    const zoneGroup = new THREE.Group();
    scene.add(zoneGroup);

    // Reusable geometries
    const geoTrunk = new THREE.CylinderGeometry(0.18, 0.24, 0.7, 7);
    const geoLeafA = new THREE.ConeGeometry(1.0, 1.7, 8);
    const geoLeafB = new THREE.ConeGeometry(0.75, 1.3, 8);
    const geoLeafC = new THREE.ConeGeometry(0.55, 1.0, 8);
    const geoRock = new THREE.IcosahedronGeometry(0.55, 0);
    const geoRockS = new THREE.IcosahedronGeometry(0.32, 0);
    const geoHouse = new THREE.BoxGeometry(1.5, 1.0, 1.5);
    const geoRoof = new THREE.ConeGeometry(1.2, 0.8, 4);
    const geoWindow = new THREE.PlaneGeometry(0.28, 0.28);
    const geoDoor = new THREE.PlaneGeometry(0.35, 0.55);
    const geoBlade = new THREE.PlaneGeometry(0.14, 0.45);
    const geoFlower = new THREE.SphereGeometry(0.05, 6, 4);
    const geoPortalRing = new THREE.TorusGeometry(0.75, 0.07, 10, 28);

    const swayables = [];
    const portals = [];
    const waterMats = [];

    function makeWater(biomeFog) {
      const mat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uColorA: { value: new THREE.Color(0x134a78) },
          uColorB: { value: new THREE.Color(0x6ad2e8) },
          uFog: { value: new THREE.Color(biomeFog) },
          uFogNear: { value: 10 },
          uFogFar: { value: 40 },
        },
        vertexShader: "varying vec2 vUv; varying float vWave; varying float vDist; uniform float uTime; void main(){ vUv = uv; vec3 p = position; p.z += sin(p.x*2.5+uTime*1.8)*0.06 + cos(p.y*2.0+uTime*1.3)*0.05; vWave = p.z; vec4 mv = modelViewMatrix * vec4(p,1.0); vDist = -mv.z; gl_Position = projectionMatrix * mv; }",
        fragmentShader: "varying vec2 vUv; varying float vWave; varying float vDist; uniform vec3 uColorA; uniform vec3 uColorB; uniform vec3 uFog; uniform float uFogNear; uniform float uFogFar; uniform float uTime; void main(){ float r = smoothstep(-0.08,0.08, vWave + sin(vUv.x*20.0 + uTime*3.0)*0.02); vec3 col = mix(uColorA,uColorB,r); float sparkle = pow(max(0.0,sin(vUv.x*40.0+uTime*4.0)*sin(vUv.y*35.0+uTime*3.1)),16.0); col += vec3(sparkle)*0.35; float fogF = smoothstep(uFogNear,uFogFar,vDist); col = mix(col,uFog,fogF); gl_FragColor = vec4(col,0.92); }",
        transparent: true,
      });
      return mat;
    }

    function buildZone(zoneName) {
      // Dispose old
      while (zoneGroup.children.length) {
        const c = zoneGroup.children.pop();
        c.traverse?.(o => {
          if (o.geometry && o.geometry !== geoTrunk && o.geometry !== geoLeafA && o.geometry !== geoLeafB && o.geometry !== geoLeafC && o.geometry !== geoRock && o.geometry !== geoRockS && o.geometry !== geoHouse && o.geometry !== geoRoof && o.geometry !== geoWindow && o.geometry !== geoDoor && o.geometry !== geoBlade && o.geometry !== geoFlower && o.geometry !== geoPortalRing) {
            o.geometry.dispose?.();
          }
          if (o.material && !o.userData.shared) {
            if (Array.isArray(o.material)) o.material.forEach(m => m.dispose?.());
            else o.material.dispose?.();
          }
        });
      }
      swayables.length = 0;
      portals.length = 0;
      waterMats.length = 0;

      const map = WORLD_MAPS[zoneName];
      const b = BIOME_3D[zoneName];

      scene.background = new THREE.Color(b.sky);
      scene.fog = new THREE.Fog(b.fog, 12, 42);
      hemi.color.setHex(b.sky);
      hemi.groundColor.setHex(b.ground);
      hemi.intensity = b.mood === "dark" ? 0.45 : b.mood === "dim" ? 0.55 : 0.7;
      sun.intensity = b.sun;
      sun.color.setHex(b.mood === "cave" ? 0xb79aff : 0xfff4d6);

      // Ground plane with vertex colors and gentle displacement
      const segX = MAP_W * 3, segZ = MAP_H * 3;
      const baseGeo = new THREE.PlaneGeometry(MAP_W * 2, MAP_H * 2, segX, segZ);
      baseGeo.rotateX(-Math.PI / 2);
      const colGround = new THREE.Color(b.ground);
      const colGrass = new THREE.Color(b.grass);
      const colPath = zoneName === "beach" ? new THREE.Color(0xf2e0a8) : zoneName === "cave" ? new THREE.Color(0x4a3f66) : new THREE.Color(0xc9a870);
      const colors = new Float32Array(baseGeo.attributes.position.count * 3);
      const pos = baseGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), z = pos.getZ(i);
        const h = Math.sin(x * 0.3) * 0.08 + Math.cos(z * 0.22) * 0.07 + Math.sin(x * 0.7 + z * 0.5) * 0.04;
        pos.setY(i, h);
        const tx = Math.floor((x + MAP_W) / 2);
        const ty = Math.floor((z + MAP_H) / 2);
        const tile = tileAt(map, tx, ty);
        let c;
        if (tile === "g") c = colGrass;
        else if (tile === "p" || tile === ":") c = colPath;
        else if (tile === "S") c = new THREE.Color(0xe4c98a);
        else if (tile === "~") c = new THREE.Color(0x1a4a6a);
        else c = colGround;
        // Slight noise for texture
        const jitter = 1 + (Math.random() - 0.5) * 0.08;
        colors[i * 3] = c.r * jitter;
        colors[i * 3 + 1] = c.g * jitter;
        colors[i * 3 + 2] = c.b * jitter;
      }
      baseGeo.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
      baseGeo.computeVertexNormals();
      const baseMat = new THREE.MeshToonMaterial({ vertexColors: true, gradientMap: toonGrad });
      const ground = new THREE.Mesh(baseGeo, baseMat);
      ground.receiveShadow = true;
      zoneGroup.add(ground);

      // Trunk + leaves materials per zone
      const trunkMat = new THREE.MeshToonMaterial({ color: 0x5a3a2a, gradientMap: toonGrad });
      const leafCol = b.mood === "dark" ? 0x6a5ea0 : b.mood === "dim" ? 0x2a5a2e : zoneName === "beach" ? 0x4a7a3a : 0x3f7a3a;
      const leafMat = new THREE.MeshToonMaterial({ color: leafCol, gradientMap: toonGrad });
      const rockCol = zoneName === "cave" ? 0x6a5e7a : zoneName === "beach" ? 0xa89876 : 0x7a7a86;
      const rockMat = new THREE.MeshToonMaterial({ color: rockCol, gradientMap: toonGrad });
      const houseWallMat = new THREE.MeshToonMaterial({ color: 0xd6b98a, gradientMap: toonGrad });
      const houseRoofMat = new THREE.MeshToonMaterial({ color: 0x9a4234, gradientMap: toonGrad });
      const windowMat = new THREE.MeshBasicMaterial({ color: 0xffd86a });
      const doorMat = new THREE.MeshBasicMaterial({ color: 0x3a2a1e });
      const bladeMat = new THREE.MeshToonMaterial({
        color: b.mood === "dark" ? 0x8a7ab8 : b.mood === "dim" ? 0x4a8a4a : 0x62b03e,
        gradientMap: toonGrad, side: THREE.DoubleSide,
      });
      const flowerColors = [0xffd23f, 0xff6ab0, 0xffffff, 0xff8a3a];

      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          const tile = tileAt(map, x, y);
          const wx = (x - MAP_W / 2) * 2 + 1;
          const wz = (y - MAP_H / 2) * 2 + 1;
          if (tile === "T") {
            const trunk = new THREE.Mesh(geoTrunk, trunkMat);
            trunk.position.set(wx, 0.35, wz);
            trunk.castShadow = true; trunk.userData.shared = true;
            zoneGroup.add(trunk);
            const lA = new THREE.Mesh(geoLeafA, leafMat);
            lA.position.set(wx, 1.55, wz);
            lA.castShadow = true; lA.userData.shared = true;
            lA.userData.swayPhase = Math.random() * 6.28;
            lA.userData.swayAmp = 0.06;
            lA.userData.swayBase = lA.position.y;
            swayables.push(lA);
            zoneGroup.add(lA);
            const lB = new THREE.Mesh(geoLeafB, leafMat);
            lB.position.set(wx + (Math.random()-0.5)*0.2, 2.35, wz + (Math.random()-0.5)*0.2);
            lB.castShadow = true; lB.userData.shared = true;
            zoneGroup.add(lB);
            const lC = new THREE.Mesh(geoLeafC, leafMat);
            lC.position.set(wx, 3.0, wz);
            lC.castShadow = true; lC.userData.shared = true;
            zoneGroup.add(lC);
          } else if (tile === "R") {
            const rock = new THREE.Mesh(geoRock, rockMat);
            rock.position.set(wx + (Math.random()-0.5)*0.3, 0.3, wz + (Math.random()-0.5)*0.3);
            rock.rotation.set(Math.random()*0.4, Math.random()*6.28, Math.random()*0.4);
            rock.scale.setScalar(0.9 + Math.random()*0.4);
            rock.castShadow = true; rock.receiveShadow = true; rock.userData.shared = true;
            zoneGroup.add(rock);
            if (Math.random() < 0.4) {
              const rs = new THREE.Mesh(geoRockS, rockMat);
              rs.position.set(wx + (Math.random()-0.5)*1.0, 0.16, wz + (Math.random()-0.5)*1.0);
              rs.rotation.y = Math.random() * 6.28;
              rs.castShadow = true; rs.userData.shared = true;
              zoneGroup.add(rs);
            }
          } else if (tile === "H") {
            const hg = new THREE.Group();
            const wall = new THREE.Mesh(geoHouse, houseWallMat);
            wall.position.y = 0.5;
            wall.castShadow = true; wall.receiveShadow = true; wall.userData.shared = true;
            hg.add(wall);
            const roof = new THREE.Mesh(geoRoof, houseRoofMat);
            roof.position.y = 1.4;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true; roof.userData.shared = true;
            hg.add(roof);
            const win1 = new THREE.Mesh(geoWindow, windowMat);
            win1.position.set(0.4, 0.55, 0.76); win1.userData.shared = true;
            hg.add(win1);
            const win2 = new THREE.Mesh(geoWindow, windowMat);
            win2.position.set(-0.4, 0.55, 0.76); win2.userData.shared = true;
            hg.add(win2);
            const door = new THREE.Mesh(geoDoor, doorMat);
            door.position.set(0, 0.3, 0.755); door.userData.shared = true;
            hg.add(door);
            hg.position.set(wx, 0, wz);
            hg.rotation.y = Math.random() * 0.3 - 0.15;
            zoneGroup.add(hg);
          } else if (tile === "~") {
            const wmat = makeWater(b.fog);
            const w = new THREE.Mesh(new THREE.PlaneGeometry(2.1, 2.1, 8, 8), wmat);
            w.rotation.x = -Math.PI / 2;
            w.position.set(wx, 0.02, wz);
            waterMats.push(wmat);
            zoneGroup.add(w);
          } else if (tile === "g") {
            const n = 6;
            for (let k = 0; k < n; k++) {
              const blade = new THREE.Mesh(geoBlade, bladeMat);
              const ox = (Math.random() - 0.5) * 1.7;
              const oz = (Math.random() - 0.5) * 1.7;
              blade.position.set(wx + ox, 0.22, wz + oz);
              blade.rotation.y = Math.random() * Math.PI;
              blade.userData.shared = true;
              blade.userData.swayPhase = Math.random() * 6.28;
              blade.userData.swayAmp = 0.18;
              blade.userData.swayAxisZ = true;
              swayables.push(blade);
              zoneGroup.add(blade);
            }
            if (Math.random() < 0.35) {
              const stem = new THREE.Mesh(geoBlade, bladeMat);
              stem.position.set(wx + (Math.random()-0.5)*1.4, 0.25, wz + (Math.random()-0.5)*1.4);
              stem.userData.shared = true;
              zoneGroup.add(stem);
              const flower = new THREE.Mesh(geoFlower, new THREE.MeshBasicMaterial({ color: flowerColors[Math.floor(Math.random()*flowerColors.length)] }));
              flower.position.copy(stem.position);
              flower.position.y = 0.48;
              zoneGroup.add(flower);
            }
          }
          const isExit = map.exits.some(e => e.x === x && e.y === y);
          if (isExit) {
            const ring = new THREE.Mesh(
              geoPortalRing,
              new THREE.MeshBasicMaterial({ color: 0x6ae0ff, transparent: true, opacity: 0.85 })
            );
            ring.position.set(wx, 0.6, wz);
            ring.rotation.x = Math.PI / 2;
            ring.userData.shared = true;
            portals.push(ring);
            zoneGroup.add(ring);
            const glow = new THREE.Mesh(
              new THREE.CircleGeometry(0.9, 24),
              new THREE.MeshBasicMaterial({ color: 0x6ae0ff, transparent: true, opacity: 0.18 })
            );
            glow.rotation.x = -Math.PI / 2;
            glow.position.set(wx, 0.05, wz);
            portals.push(glow);
            zoneGroup.add(glow);
          }
        }
      }
    }

    buildZone(stateRef.current.zone);

    // Debug handles (safe to expose; used by e2e tests)
    window.__world = { state: stateRef.current, camera, playerGroup, renderer, scene };

    function resize() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      if (w <= 0 || h <= 0) return;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas);

    const GAME_KEYS = ["arrowup","arrowdown","arrowleft","arrowright","w","a","s","d","shift"];
    const onDown = (e) => {
      if (!canvas.isConnected) return;
      const k = e.key.toLowerCase();
      if (!GAME_KEYS.includes(k)) return;
      // Don't capture keys if user is typing in an input
      const ae = document.activeElement;
      if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" || ae.isContentEditable)) return;
      keysRef.current[k] = true;
      e.preventDefault();
    };
    const onUp = (e) => {
      const k = e.key.toLowerCase();
      if (GAME_KEYS.includes(k)) keysRef.current[k] = false;
    };
    const onBlur = () => { keysRef.current = {}; };
    window.addEventListener("keydown", onDown);
    window.addEventListener("keyup", onUp);
    window.addEventListener("blur", onBlur);

    function isBlockedAt(wx, wz, mapName) {
      const map = WORLD_MAPS[mapName];
      const tx = Math.floor((wx + MAP_W) / 2);
      const ty = Math.floor((wz + MAP_H) / 2);
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const cx = tx + dx, cy = ty + dy;
          const tile = tileAt(map, cx, cy);
          if (isWalkable(tile)) continue;
          const tcx = (cx - MAP_W / 2) * 2 + 1;
          const tcz = (cy - MAP_H / 2) * 2 + 1;
          const dx2 = wx - tcx, dz2 = wz - tcz;
          if (Math.hypot(dx2, dz2) < 1.1) return true;
        }
      }
      // Clamp to plane bounds
      if (wx < -MAP_W + 0.5 || wx > MAP_W - 0.5 || wz < -MAP_H + 0.5 || wz > MAP_H - 0.5) return true;
      return false;
    }

    let raf;
    const clock = new THREE.Clock();
    const camTarget = new THREE.Vector3();
    const lookTarget = new THREE.Vector3();

    const tick = () => {
      raf = requestAnimationFrame(tick);
      const dt = Math.min(0.05, clock.getDelta());
      const elapsed = clock.elapsedTime;
      const s = stateRef.current;

      s.moving = false;
      if (!s.paused) {
        const k = keysRef.current;
        let fwd = 0, right = 0;
        if (k["arrowup"] || k["w"]) fwd += 1;
        if (k["arrowdown"] || k["s"]) fwd -= 1;
        if (k["arrowleft"] || k["a"]) right -= 1;
        if (k["arrowright"] || k["d"]) right += 1;
        const mag = Math.hypot(fwd, right);
        if (mag > 0) {
          s.moving = true;
          fwd /= mag; right /= mag;
          // Camera-relative movement: W = away from camera, D = strafe right.
          // camRight = cross(camForward, worldUp) in right-handed coords.
          const cfx = Math.sin(s.cameraYaw), cfz = Math.cos(s.cameraYaw);
          const crx = -cfz, crz = cfx;
          const wdx = fwd * cfx + right * crx;
          const wdz = fwd * cfz + right * crz;
          const speed = (k["shift"] ? 7.5 : 4.2) * dt;
          const tryX = s.wx + wdx * speed;
          if (!isBlockedAt(tryX, s.wz, s.zone)) s.wx = tryX;
          const tryZ = s.wz + wdz * speed;
          if (!isBlockedAt(s.wx, tryZ, s.zone)) s.wz = tryZ;
          // Player rotates toward movement direction every frame (any key
          // combo rotates the world, including pure strafe — feels like
          // Pokémon SV: hold A and the character circles left).
          const target = Math.atan2(wdx, wdz);
          let diff = target - s.facing;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          s.facing += diff * Math.min(1, dt * 12);
          while (s.facing > Math.PI) s.facing -= Math.PI * 2;
          while (s.facing < -Math.PI) s.facing += Math.PI * 2;
          s.steps += speed;

          const tx = Math.floor((s.wx + MAP_W) / 2);
          const ty = Math.floor((s.wz + MAP_H) / 2);
          const tileKey = tx + "," + ty;
          const map = WORLD_MAPS[s.zone];
          const exit = map.exits.find(e => e.x === tx && e.y === ty);
          if (exit && tileKey !== s.lastExitKey) {
            s.lastExitKey = tileKey;
            s.paused = true;
            setFlash(f => f + 1);
            setTimeout(() => {
              s.zone = exit.to;
              s.wx = (exit.tx - MAP_W / 2) * 2 + 1;
              s.wz = (exit.ty - MAP_H / 2) * 2 + 1;
              // Mark the arrival tile as "used" so we don't instantly bounce
              // back through the paired exit in the new zone.
              s.lastExitKey = exit.tx + "," + exit.ty;
              s.lastTileKey = s.lastExitKey;
              buildZone(s.zone);
              setZoneKey(exit.to);
              s.paused = false;
            }, 280);
          } else if (!exit) {
            s.lastExitKey = "";
            const tile = tileAt(map, tx, ty);
            if (tile === "g" && map.biome.length > 0 && tileKey !== s.lastTileKey) {
              s.lastTileKey = tileKey;
              if (Math.random() < 0.17) {
                const wild = pickWildPokemon(allPokemonRef.current, map.biome);
                if (wild) {
                  const firstTime = !s.seen.has(wild.name);
                  s.seen.add(wild.name);
                  s.paused = true;
                  setToast(t.worldEncounter);
                  setFlash(f => f + 1);
                  setTimeout(() => {
                    setToast(null);
                    onEncounterRef.current(wild, firstTime);
                  }, 700);
                }
              }
            }
          }
        }
      }

      playerGroup.position.set(s.wx, 0, s.wz);
      playerGroup.rotation.y = s.facing;
      body.position.y = 0.6 + (s.moving ? Math.abs(Math.sin(elapsed * 11)) * 0.07 : 0);
      head.position.y = 1.2 + (s.moving ? Math.abs(Math.sin(elapsed * 11)) * 0.05 : 0);
      cap.position.y = 1.42 + (s.moving ? Math.abs(Math.sin(elapsed * 11)) * 0.05 : 0);
      capBrim.position.y = 1.32 + (s.moving ? Math.abs(Math.sin(elapsed * 11)) * 0.05 : 0);
      eyeL.position.y = 1.22 + (s.moving ? Math.abs(Math.sin(elapsed * 11)) * 0.05 : 0);
      eyeR.position.y = 1.22 + (s.moving ? Math.abs(Math.sin(elapsed * 11)) * 0.05 : 0);

      // Orbital chase camera: always lerps toward player's facing, even
      // while moving. The fwd > 0.1 guard keeps pure strafe from rotating,
      // so A/D still feel like side-steps rather than spirals.
      let yawDiff = s.facing - s.cameraYaw;
      while (yawDiff > Math.PI) yawDiff -= Math.PI * 2;
      while (yawDiff < -Math.PI) yawDiff += Math.PI * 2;
      s.cameraYaw += yawDiff * Math.min(1, dt * 3.5);
      while (s.cameraYaw > Math.PI) s.cameraYaw -= Math.PI * 2;
      while (s.cameraYaw < -Math.PI) s.cameraYaw += Math.PI * 2;
      const dist = 7.2, height = 5.2;
      camera.position.set(
        s.wx - Math.sin(s.cameraYaw) * dist,
        height,
        s.wz - Math.cos(s.cameraYaw) * dist
      );
      lookTarget.set(s.wx, 1.2, s.wz);
      camera.lookAt(lookTarget);

      // Animate water, grass sway, portals
      for (let i = 0; i < waterMats.length; i++) waterMats[i].uniforms.uTime.value = elapsed;
      for (let i = 0; i < swayables.length; i++) {
        const o = swayables[i];
        const ph = o.userData.swayPhase || 0;
        const amp = o.userData.swayAmp || 0.1;
        if (o.userData.swayAxisZ) {
          o.rotation.z = Math.sin(elapsed * 2.5 + ph) * amp;
        } else {
          o.position.y = (o.userData.swayBase || o.position.y) + Math.sin(elapsed * 1.4 + ph) * amp;
        }
      }
      for (let i = 0; i < portals.length; i++) {
        const p = portals[i];
        if (p.geometry.type === "TorusGeometry") {
          p.rotation.z = elapsed * 1.8;
          p.scale.setScalar(1 + Math.sin(elapsed * 3) * 0.06);
        } else {
          p.material.opacity = 0.15 + (Math.sin(elapsed * 3) + 1) * 0.06;
        }
      }

      renderer.render(scene, camera);
    };
    tick();

    return () => {
      cancelAnimationFrame(raf);
      ro.disconnect();
      window.removeEventListener("keydown", onDown);
      window.removeEventListener("keyup", onUp);
      window.removeEventListener("blur", onBlur);
      scene.traverse(o => {
        o.geometry?.dispose?.();
        if (o.material) {
          if (Array.isArray(o.material)) o.material.forEach(m => m.dispose?.());
          else o.material.dispose?.();
        }
      });
      renderer.dispose();
    };
  }, [threeReady]);

  const zoneName = t[WORLD_MAPS[zoneKey].name] || zoneKey;
  const seenCount = (save.seen || []).length;

  return (
    <div className="world-wrap" ref={wrapRef}>
      <div className="world-header">
        <div className="world-zone-badge">
          <span>◈</span><b>{zoneName}</b>
        </div>
        <div className="world-stats">
          <span>{t.worldParty}<b>{save.party[0]?.name || "—"}</b></span>
          <span>{t.worldSteps}<b>{Math.floor(save.steps || 0)}</b></span>
          <span>{t.worldSeen}<b>{seenCount}/151</b></span>
        </div>
      </div>
      <div className="world-canvas-wrap">
        <canvas ref={canvasRef} className="world-canvas" tabIndex={0}/>
        {!threeReady && !threeError && (
          <div className="world-loader">
            <div className="spinner"/>
            <div>{lang==="es" ? "Cargando motor 3D…" : "Loading 3D engine…"}</div>
          </div>
        )}
        {threeError && (
          <div className="world-loader">
            <div style={{color:"var(--bad)"}}>⚠ {threeError}</div>
          </div>
        )}
        <div className="world-hud"><span className="dot"/><b>{zoneName}</b></div>
        <div className="world-controls-help">{t.worldControls}</div>
        {toast && <div className="world-toast">{toast}</div>}
        {flash > 0 && <div className="world-flash" key={flash}/>}
      </div>
    </div>
  );
}
window.WorldView = WorldView;
window.WORLD_MAPS = WORLD_MAPS;
window.loadWorldSave = loadWorldSave;
window.saveWorldSave = saveWorldSave;
window.clearWorldSave = clearWorldSave;

</script>
<script type="text/babel">
// Main app: layout, state, data fetch, filters, search, grid + detail + compare
const { useState, useEffect, useMemo, useRef } = React;

function Particles(){
  const ref = useRef(null);
  useEffect(()=>{
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    let w, h, parts = [];
    const resize = () => {
      w = c.width = window.innerWidth;
      h = c.height = window.innerHeight;
    };
    resize();
    window.addEventListener("resize", resize);
    parts = Array.from({length: 40}, () => ({
      x: Math.random()*w, y: Math.random()*h,
      vx: (Math.random()-0.5)*0.15, vy: -0.15 - Math.random()*0.3,
      r: Math.random()*1.5+0.3, a: Math.random()*0.4+0.1
    }));
    let raf;
    const tick = () => {
      ctx.clearRect(0,0,w,h);
      parts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -5) { p.y = h+5; p.x = Math.random()*w; }
        ctx.beginPath();
        ctx.fillStyle = `rgba(106,224,255,${p.a})`;
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
      });
      raf = requestAnimationFrame(tick);
    };
    tick();
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener("resize",resize); };
  }, []);
  return <canvas ref={ref} style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",opacity:0.6}}/>;
}

function App(){
  const [lang, setLang] = useState("es");
  const [tab, setTab] = useState("explore");
  const [tweaks, setTweaks] = useState(window.__TWEAKS__ || {theme:"rpg",density:"comfortable",showScanlines:true,particles:true});
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const [pokemon, setPokemon] = useState([]);
  const [loadProgress, setLoadProgress] = useState(0);
  const [query, setQuery] = useState("");
  const [selectedTypes, setSelectedTypes] = useState([]);
  const [sortBy, setSortBy] = useState("id");
  const [detail, setDetail] = useState(null);
  const [featuredIdx, setFeaturedIdx] = useState(0);
  const [worldSave, setWorldSave] = useState(() => (window.loadWorldSave ? window.loadWorldSave() : null));
  const [worldBattle, setWorldBattle] = useState(null);
  const [worldToast, setWorldToast] = useState(null);

  const t = window.I18N[lang];

  // Theme class on body
  useEffect(()=>{
    document.body.className = "theme-" + tweaks.theme + (tweaks.showScanlines ? " scanlines":"");
  }, [tweaks.theme, tweaks.showScanlines]);

  // Tweaks protocol
  useEffect(()=>{
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return ()=>window.removeEventListener("message", onMsg);
  }, []);

  // Load 151
  useEffect(()=>{
    let cancelled = false;
    const ids = Array.from({length:151}, (_,i)=>i+1);
    window.PokeAPI.loadBatch(ids, 12, (done, total)=>{
      if (!cancelled) setLoadProgress(Math.round(done/total*100));
    }).then(list => {
      if (!cancelled) {
        list.sort((a,b)=>a.id-b.id);
        setPokemon(list);
      }
    });
    return ()=>{ cancelled = true; };
  }, []);

  // Featured hero rotation
  useEffect(()=>{
    if (pokemon.length === 0) return;
    // Pick interesting ones (starters and legendaries)
    const interesting = pokemon.filter(p => [6,9,3,25,150,149,151,130,94,65].includes(p.id));
    const pool = interesting.length > 0 ? interesting : pokemon;
    const iv = setInterval(()=>{
      setFeaturedIdx(i => (i+1) % pool.length);
    }, 5000);
    return ()=>clearInterval(iv);
  }, [pokemon.length]);

  const featuredPool = useMemo(()=>{
    const interesting = pokemon.filter(p => [6,9,3,25,150,149,151,130,94,65].includes(p.id));
    return interesting.length > 0 ? interesting : pokemon;
  }, [pokemon]);
  const featured = featuredPool[featuredIdx % (featuredPool.length || 1)];

  // Filter and sort
  const filtered = useMemo(()=>{
    let list = pokemon;
    if (query){
      const q = query.toLowerCase().trim();
      list = list.filter(p =>
        p.name.includes(q) || String(p.id).padStart(3,"0").includes(q) || String(p.id) === q
      );
    }
    if (selectedTypes.length > 0){
      list = list.filter(p => selectedTypes.some(t => p.types.includes(t)));
    }
    const sorters = {
      id: (a,b)=>a.id-b.id,
      name: (a,b)=>a.name.localeCompare(b.name),
      hp: (a,b)=>b.stats.hp-a.stats.hp,
      atk: (a,b)=>b.stats.attack-a.stats.attack,
    };
    list = [...list].sort(sorters[sortBy]);
    return list;
  }, [pokemon, query, selectedTypes, sortBy]);

  const availableTypes = useMemo(()=>{
    const set = new Set();
    pokemon.forEach(p => p.types.forEach(t => set.add(t)));
    return window.TYPE_ORDER.filter(t => set.has(t));
  }, [pokemon]);

  const toggleType = (t) => {
    setSelectedTypes(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev, t]);
  };

  return (
    <div className="app">
      {tweaks.particles && <Particles/>}

      {/* Top bar */}
      <div className="topbar">
        <div className="logo">
          <div className="dot"/>
          <div>
            <div className="word">POKÉDEX · ARENA</div>
            <div className="sub">RPG EXPLORER v1.0</div>
          </div>
        </div>
        <div className="sep"/>
        <div className="nav">
          <button className={tab==="explore"?"on":""} onClick={()=>setTab("explore")}>◆ {t.tabExplore}</button>
          <button className={tab==="compare"?"on":""} onClick={()=>setTab("compare")}>⇋ {t.tabCompare}</button>
          <button className={tab==="world"?"on":""} onClick={()=>setTab("world")}>⬢ {t.tabWorld}</button>
        </div>
        <div className="spacer"/>
        <div className="lang">
          <div className={"segment "+(lang==="es"?"on":"")} onClick={()=>setLang("es")}>ES</div>
          <div className={"segment "+(lang==="en"?"on":"")} onClick={()=>setLang("en")}>EN</div>
        </div>
      </div>

      {tab === "explore" && (
        <>
          {/* Hero */}
          <div className="hero">
            <div className="hud-corners"><span className="c2"/><span className="c3"/></div>
            <div className="hero-left">
              <div>
                <div className="hero-kicker"><span className="pulse"/>{t.tagline}</div>
                <h1>{t.title1} <span className="grad">{t.title2}</span> {t.title3}</h1>
                <p className="lead">{t.lead}</p>
              </div>
              <div className="hero-stats">
                <div className="chip"><span>{t.statLoaded}</span><b>{pokemon.length}/151</b></div>
                <div className="chip"><span>{t.statTypes}</span><b>{availableTypes.length}</b></div>
                <div className="chip"><span>{t.statViewed}</span><b>{filtered.length}</b></div>
              </div>
            </div>
            <div className="hero-right">
              <div className="hero-feature">
                <div className="rings">
                  <div className="ring r3"/>
                  <div className="ring r2"/>
                  <div className="ring r1"/>
                </div>
                <div className="glow" style={{
                  background: featured ? `radial-gradient(circle, ${window.TYPE_COLORS[featured.types[0]]}66, transparent 60%)` : undefined
                }}/>
                {featured && <img src={featured.sprite} alt={featured.name}
                  onError={(e)=>{e.target.src = featured.spriteSmall}}
                  onClick={()=>setDetail(featured)}
                  style={{cursor:"pointer"}}/>}
                {featured && (
                  <div className="info">
                    <div className="no">№ {String(featured.id).padStart(3,"0")} · {t.featured}</div>
                    <div className="nm">{featured.name}</div>
                  </div>
                )}
                <div className="cycle">
                  <button onClick={()=>setFeaturedIdx(i=>(i-1+featuredPool.length)%featuredPool.length)}>‹</button>
                  <button onClick={()=>setFeaturedIdx(i=>(i+1)%featuredPool.length)}>›</button>
                </div>
              </div>
            </div>
          </div>

          {/* Controls */}
          <div className="controls">
            <div className="search">
              <svg className="icon" viewBox="0 0 20 20" fill="none">
                <circle cx="9" cy="9" r="6" stroke="currentColor" strokeWidth="1.6"/>
                <path d="M14 14L18 18" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
              </svg>
              <input placeholder={t.searchPlaceholder} value={query} onChange={(e)=>setQuery(e.target.value)}/>
              <span className="kbd">ESC</span>
            </div>
            <div className="type-filters">
              <button className={"type-chip "+(selectedTypes.length===0?"on":"")}
                onClick={()=>setSelectedTypes([])}
                style={selectedTypes.length===0 ? {color:"var(--accent)"} : {}}>
                ✦ {t.allTypes}
              </button>
              {availableTypes.map(tp => {
                const c = window.TYPE_COLORS[tp];
                const on = selectedTypes.includes(tp);
                return (
                  <button key={tp} className={"type-chip "+(on?"on":"")}
                    onClick={()=>toggleType(tp)}
                    style={on ? {color:c, background:`${c}14`} : {}}>
                    <span className="sw" style={{background:c}}/>
                    {tp}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Grid meta */}
          <div className="grid-meta">
            <div className="count">
              {pokemon.length < 151
                ? `${t.loading} · ${loadProgress}%`
                : `${filtered.length} ${t.resultsOf} ${pokemon.length} ${t.resultsPokemon}`}
            </div>
            <div className="sort">
              {[["id",t.sortNo],["name",t.sortName],["hp",t.sortHp],["atk",t.sortAtk]].map(([v,lbl])=>(
                <button key={v} className={sortBy===v?"on":""} onClick={()=>setSortBy(v)}>↕ {lbl}</button>
              ))}
            </div>
          </div>

          {/* Grid */}
          {filtered.length === 0 && pokemon.length > 0 ? (
            <div style={{
              textAlign:"center",padding:"60px 20px",
              fontFamily:"JetBrains Mono",color:"var(--ink-faint)",letterSpacing:"0.2em",textTransform:"uppercase",fontSize:12
            }}>{t.noResults}</div>
          ) : (
            <div className={"grid " + tweaks.density}>
              {filtered.map(p => (
                <window.PokeCard key={p.id} p={p} onClick={()=>setDetail(p)}/>
              ))}
              {pokemon.length < 151 && Array.from({length: 12}).map((_,i) => (
                <div key={"sk"+i} className="skeleton"/>
              ))}
            </div>
          )}
        </>
      )}

      {tab === "compare" && (
        <div style={{marginTop:22}}>
          <div style={{
            border:"1px solid var(--stroke)",borderRadius:18,padding:"28px 32px",
            background:"var(--panel)",marginBottom:20
          }}>
            <div className="hero-kicker"><span className="pulse"/>{t.tabCompare.toUpperCase()} · VS MODE</div>
            <h2 style={{fontFamily:"Space Grotesk",fontSize:36,margin:"10px 0 0",letterSpacing:"-0.02em"}}>
              {lang==="es" ? "Enfrenta dos Pokémon y analiza sus atributos" : "Pit two Pokémon against each other"}
            </h2>
          </div>
          <window.CompareView allPokemon={pokemon} lang={lang}/>
        </div>
      )}

      {tab === "world" && (
        <>
          {pokemon.length < 151 && (
            <div className="starter-wrap">
              <p style={{color:"var(--ink-dim)",margin:0}}>{t.loading} ({loadProgress}%)</p>
            </div>
          )}
          {pokemon.length >= 151 && !worldSave && (
            <window.StarterPicker
              allPokemon={pokemon} lang={lang} existingSave={null}
              onStart={(starter) => {
                const fresh = {
                  party: [starter],
                  pos: { zone: "town", x: window.WORLD_MAPS.town.spawn.x, y: window.WORLD_MAPS.town.spawn.y },
                  steps: 0,
                  seen: [starter.name],
                };
                window.saveWorldSave(fresh);
                setWorldSave(fresh);
              }}/>
          )}
          {pokemon.length >= 151 && worldSave && (
            <window.WorldView
              allPokemon={pokemon} lang={lang} save={worldSave} setSave={setWorldSave}
              battleOpen={!!worldBattle}
              onEncounter={(wild, firstSight) => {
                if (firstSight) {
                  setWorldToast(`${t.worldFirstSight} ${wild.name}!`);
                  setTimeout(()=>setWorldToast(null), 2200);
                }
                setWorldBattle({ a: worldSave.party[0], b: wild });
              }}/>
          )}
          {pokemon.length >= 151 && worldSave && (
            <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"center",flexWrap:"wrap"}}>
              <button className="starter-card" style={{padding:"8px 16px",fontSize:12,cursor:"pointer",border:"1px solid var(--stroke-2)",borderRadius:10,background:"var(--bg-1)",color:"var(--ink-dim)",fontFamily:"var(--font-mono)",letterSpacing:"0.08em",textTransform:"uppercase"}}
                onClick={() => {
                  if (confirm(lang==="es"?"¿Borrar partida?":"Delete save?")) {
                    window.clearWorldSave();
                    setWorldSave(null);
                  }
                }}>✕ {t.worldDeleteSave}</button>
            </div>
          )}
        </>
      )}

      {worldBattle && (
        <window.BattleArena
          a={worldBattle.a} b={worldBattle.b} lang={lang}
          onClose={()=>setWorldBattle(null)}/>
      )}
      {worldToast && (
        <div style={{
          position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
          padding:"12px 22px",background:"rgba(10,14,26,0.95)",border:"1px solid var(--accent)",
          borderRadius:12,color:"var(--ink)",fontFamily:"var(--font-display)",fontWeight:600,
          fontSize:16,letterSpacing:"0.02em",textTransform:"capitalize",zIndex:100,
          boxShadow:"0 0 30px rgba(106,224,255,0.3)"
        }}>✦ {worldToast}</div>
      )}

      {detail && <window.DetailModal p={detail} onClose={()=>setDetail(null)}
        onPick={(id)=>{
          const found = pokemon.find(x=>x.id===id);
          if (found) setDetail(found);
        }} lang={lang}/>}

      <button className={"tweaks-btn " + (!tweaksOpen ? "visible":"")} onClick={()=>setTweaksOpen(true)}>
        ⚙ {t.tweaks}
      </button>
      <window.TweaksPanel tweaks={tweaks} setTweaks={setTweaks} lang={lang}
        visible={tweaksOpen} onClose={()=>setTweaksOpen(false)}/>
      {tweaksOpen && (
        <div style={{position:"fixed",inset:0,zIndex:60}} onClick={()=>setTweaksOpen(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
