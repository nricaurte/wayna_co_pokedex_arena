<script type="text/babel">
// Battle mini-game: turn-based combat between two Pokémon
const { useState: useStateB, useEffect: useEffectB, useRef: useRefB } = React;

// Type effectiveness (simplified, original matrix)
const TYPE_EFFECT = {
  fire:     { grass:2, ice:2, bug:2, steel:2, water:0.5, fire:0.5, rock:0.5, dragon:0.5 },
  water:    { fire:2, ground:2, rock:2, water:0.5, grass:0.5, dragon:0.5 },
  grass:    { water:2, ground:2, rock:2, fire:0.5, grass:0.5, flying:0.5, bug:0.5, dragon:0.5, steel:0.5, poison:0.5 },
  electric: { water:2, flying:2, ground:0, electric:0.5, grass:0.5, dragon:0.5 },
  ice:      { grass:2, ground:2, flying:2, dragon:2, fire:0.5, water:0.5, ice:0.5, steel:0.5 },
  fighting: { normal:2, ice:2, rock:2, dark:2, steel:2, flying:0.5, poison:0.5, bug:0.5, psychic:0.5, fairy:0.5, ghost:0 },
  poison:   { grass:2, fairy:2, poison:0.5, ground:0.5, rock:0.5, ghost:0.5, steel:0 },
  ground:   { fire:2, electric:2, poison:2, rock:2, steel:2, grass:0.5, bug:0.5, flying:0 },
  flying:   { grass:2, fighting:2, bug:2, electric:0.5, rock:0.5, steel:0.5 },
  psychic:  { fighting:2, poison:2, psychic:0.5, steel:0.5, dark:0 },
  bug:      { grass:2, psychic:2, dark:2, fire:0.5, fighting:0.5, poison:0.5, flying:0.5, ghost:0.5, steel:0.5, fairy:0.5 },
  rock:     { fire:2, ice:2, flying:2, bug:2, fighting:0.5, ground:0.5, steel:0.5 },
  ghost:    { psychic:2, ghost:2, dark:0.5, normal:0 },
  dragon:   { dragon:2, steel:0.5, fairy:0 },
  dark:     { psychic:2, ghost:2, fighting:0.5, dark:0.5, fairy:0.5 },
  steel:    { ice:2, rock:2, fairy:2, fire:0.5, water:0.5, electric:0.5, steel:0.5 },
  fairy:    { fighting:2, dragon:2, dark:2, fire:0.5, poison:0.5, steel:0.5 },
  normal:   { rock:0.5, ghost:0, steel:0.5 },
};

function effectiveness(moveType, defenderTypes){
  let mult = 1;
  const em = TYPE_EFFECT[moveType];
  if (!em) return 1;
  defenderTypes.forEach(t => {
    if (em[t] !== undefined) mult *= em[t];
  });
  return mult;
}

// Pick 4 representative moves from the pokemon
function pickMoves(p){
  const names = p.moves.slice(0, 10);
  // Deterministic but varied "power" based on name length
  const chosen = names.slice(0, 4);
  return chosen.map((name, i) => {
    const power = 40 + ((name.length * 7 + i * 11) % 55); // 40-95
    const type = (p.types[i % p.types.length]) || p.types[0];
    const category = i % 2 === 0 ? "physical" : "special";
    const accuracy = 85 + (name.length % 15);
    return { name, type, power, category, accuracy };
  });
}

function calcDamage(attacker, defender, move){
  const atk = move.category === "physical" ? attacker.stats.attack : attacker.stats["special-attack"];
  const def = move.category === "physical" ? defender.stats.defense : defender.stats["special-defense"];
  const level = 50;
  const stab = attacker.types.includes(move.type) ? 1.5 : 1;
  const eff = effectiveness(move.type, defender.types);
  const crit = Math.random() < 0.0625 ? 2 : 1;
  const rand = 0.85 + Math.random() * 0.15;
  // Simplified formula
  const base = (((2*level/5 + 2) * move.power * atk / def) / 50) + 2;
  const dmg = Math.floor(base * stab * eff * crit * rand);
  return { dmg: Math.max(1, dmg), eff, crit: crit === 2, stab: stab > 1 };
}

function effText(eff, lang){
  if (eff === 0) return lang==="es" ? "¡No afecta!" : "No effect!";
  if (eff >= 2) return lang==="es" ? "¡Es super efectivo!" : "Super effective!";
  if (eff > 0 && eff < 1) return lang==="es" ? "No es muy efectivo…" : "Not very effective…";
  return "";
}

function HPBar({ current, max, accent, side }){
  const pct = Math.max(0, (current / max) * 100);
  const color = pct > 50 ? "#5ef2a3" : pct > 20 ? "#ffd23f" : "#ff6a6a";
  return (
    <div className={"hp-bar side-"+side}>
      <div className="hp-track">
        <div className="hp-fill" style={{width: pct+"%", background:`linear-gradient(90deg, ${color}, ${color}aa)`}}/>
      </div>
      <div className="hp-num">{Math.ceil(current)}<span>/{max}</span></div>
    </div>
  );
}

function BattleArena({ a, b, onClose, lang }){
  const t = window.I18N[lang];
  const [hpA, setHpA] = useStateB(a.stats.hp * 2);
  const [hpB, setHpB] = useStateB(b.stats.hp * 2);
  const [log, setLog] = useStateB([]);
  const [turn, setTurn] = useStateB("player"); // 'player' | 'enemy' | 'busy' | 'over'
  const [winner, setWinner] = useStateB(null);
  const [shakeA, setShakeA] = useStateB(false);
  const [shakeB, setShakeB] = useStateB(false);
  const [flashA, setFlashA] = useStateB(false);
  const [flashB, setFlashB] = useStateB(false);
  const [lungeA, setLungeA] = useStateB(false);
  const [lungeB, setLungeB] = useStateB(false);
  const [projectile, setProjectile] = useStateB(null); // {from:'a'|'b', type, kind, id}
  const [impact, setImpact] = useStateB(null); // {side:'a'|'b', color, id}
  const [dmgPop, setDmgPop] = useStateB(null); // {side, value, crit, id}

  const maxA = a.stats.hp * 2;
  const maxB = b.stats.hp * 2;

  const movesA = useRefB(pickMoves(a)).current;
  const movesB = useRefB(pickMoves(b)).current;

  const accentA = window.TYPE_COLORS[a.types[0]] || "#6ae0ff";
  const accentB = window.TYPE_COLORS[b.types[0]] || "#ff4da6";

  const pushLog = (text, kind="info") => {
    setLog(prev => [...prev, { text, kind, id: Date.now()+Math.random() }]);
  };

  useEffectB(() => {
    pushLog(lang==="es"
      ? `¡${a.name.toUpperCase()} vs ${b.name.toUpperCase()}! ¡Comienza la batalla!`
      : `${a.name.toUpperCase()} vs ${b.name.toUpperCase()}! Battle start!`, "start");
    // First turn based on speed
    if (b.stats.speed > a.stats.speed){
      setTurn("busy");
      setTimeout(() => {
        pushLog(lang==="es" ? `${b.name} es más rápido…` : `${b.name} is faster…`);
        setTimeout(enemyTurn, 900);
      }, 700);
    }
  }, []);

  // Visual kind: contact moves lunge; projectile moves fire a bolt
  function moveKind(move){
    const contactTypes = ["fighting","normal","rock","ground","bug","steel"];
    return contactTypes.includes(move.type) || move.category === "physical" && Math.random()<0.5
      ? "contact" : "projectile";
  }

  function applyHit(targetIsB, dmg, eff, crit, stab, move, attacker){
    const moveName = move.name || move;
    const kind = move.type ? moveKind(move) : "projectile";
    const mType = move.type || attacker.types[0];
    const color = window.TYPE_COLORS[mType] || "#6ae0ff";

    pushLog(lang==="es"
      ? `${attacker.name} usa ${moveName.replace(/-/g," ").toUpperCase()}!`
      : `${attacker.name} used ${moveName.replace(/-/g," ").toUpperCase()}!`, "move");

    // Attacker animation (lunge)
    const attackerIsA = !targetIsB;
    if (kind === "contact"){
      if (attackerIsA) { setLungeA(true); setTimeout(()=>setLungeA(false), 420); }
      else { setLungeB(true); setTimeout(()=>setLungeB(false), 420); }
    } else {
      // Projectile
      const pid = Date.now()+Math.random();
      setProjectile({from: attackerIsA?"a":"b", type: mType, color, id: pid});
      setTimeout(()=>setProjectile(p => p && p.id===pid ? null : p), 620);
    }

    // Delay impact to sync with animation
    const impactDelay = kind === "contact" ? 240 : 560;
    setTimeout(() => {
      // Impact visuals on defender
      if (targetIsB){ setShakeB(true); setFlashB(true); setTimeout(()=>{setShakeB(false);setFlashB(false);}, 450); }
      else { setShakeA(true); setFlashA(true); setTimeout(()=>{setShakeA(false);setFlashA(false);}, 450); }
      const iid = Date.now()+Math.random();
      setImpact({side: targetIsB?"b":"a", color, id: iid, kind});
      setTimeout(()=>setImpact(imp => imp && imp.id===iid ? null : imp), 500);

      if (eff === 0){
        pushLog(effText(eff, lang), "miss");
        return;
      }
      if (crit) pushLog(lang==="es" ? "¡Golpe crítico!" : "Critical hit!", "crit");
      if (eff !== 1) pushLog(effText(eff, lang), eff>1?"super":"weak");

      // Damage popup
      const did = Date.now()+Math.random();
      setDmgPop({side: targetIsB?"b":"a", value: dmg, crit, eff, id: did});
      setTimeout(()=>setDmgPop(d => d && d.id===did ? null : d), 900);

      if (targetIsB){
        setHpB(h => {
          const nh = Math.max(0, h - dmg);
          if (nh <= 0){
            setTimeout(()=>{
              pushLog(lang==="es" ? `¡${b.name.toUpperCase()} se debilitó!` : `${b.name.toUpperCase()} fainted!`, "faint");
              pushLog(lang==="es" ? `¡${a.name.toUpperCase()} GANA!` : `${a.name.toUpperCase()} WINS!`, "win");
              setWinner(a); setTurn("over");
            }, 400);
          }
          return nh;
        });
      } else {
        setHpA(h => {
          const nh = Math.max(0, h - dmg);
          if (nh <= 0){
            setTimeout(()=>{
              pushLog(lang==="es" ? `¡${a.name.toUpperCase()} se debilitó!` : `${a.name.toUpperCase()} fainted!`, "faint");
              pushLog(lang==="es" ? `¡${b.name.toUpperCase()} GANA!` : `${b.name.toUpperCase()} WINS!`, "win");
              setWinner(b); setTurn("over");
            }, 400);
          }
          return nh;
        });
      }
    }, impactDelay);
    return true;
  }

  function playerAttack(move){
    if (turn !== "player") return;
    setTurn("busy");
    // Accuracy check
    if (Math.random() * 100 > move.accuracy){
      pushLog(lang==="es" ? `${a.name} usa ${move.name.replace(/-/g," ").toUpperCase()}!` : `${a.name} used ${move.name.replace(/-/g," ").toUpperCase()}!`, "move");
      pushLog(lang==="es" ? "¡Pero falló!" : "But it missed!", "miss");
      setTimeout(enemyTurn, 1100);
      return;
    }
    const { dmg, eff, crit, stab } = calcDamage(a, b, move);
    applyHit(true, dmg, eff, crit, stab, move, a);
    setTimeout(() => {
      if (hpB - dmg <= 0) return; // battle over
      enemyTurn();
    }, 1700);
  }

  function enemyTurn(){
    // AI: pick highest expected damage among moves
    const picks = movesB.map(m => {
      const { dmg, eff } = calcDamage(b, a, m);
      return { m, score: dmg * (eff || 0.1) };
    }).sort((x,y) => y.score - x.score);
    const chosen = picks[0].m;

    setTurn("busy");
    setTimeout(() => {
      if (Math.random() * 100 > chosen.accuracy){
        pushLog(lang==="es" ? `${b.name} usa ${chosen.name.replace(/-/g," ").toUpperCase()}!` : `${b.name} used ${chosen.name.replace(/-/g," ").toUpperCase()}!`, "move");
        pushLog(lang==="es" ? "¡Pero falló!" : "But it missed!", "miss");
        setTimeout(()=>setTurn("player"), 900);
        return;
      }
      const { dmg, eff, crit, stab } = calcDamage(b, a, chosen);
      applyHit(false, dmg, eff, crit, stab, chosen, b);
      setTimeout(()=>{
        if (hpA - dmg <= 0) return;
        setTurn("player");
      }, 1700);
    }, 800);
  }

  const logRef = useRefB(null);
  useEffectB(()=>{
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [log]);

  return (
    <div className="scrim" onClick={onClose}>
      <div className="battle" onClick={e=>e.stopPropagation()}>
        <button className="close battle-close" onClick={onClose} aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
        </button>

        {/* Stage */}
        <div className="stage">
          <div className="stage-bg">
            <div className="stage-grid"/>
            <div className="stage-sun"/>
          </div>

          {/* Enemy (B) — top right */}
          <div className={"fighter enemy " + (shakeB?"shake ":"") + (flashB?"flash ":"") + (lungeB?"lunge ":"")} style={{"--accent": accentB}}>
            <div className="name-plate">
              <div className="np-top">
                <span className="np-name">{b.name}</span>
                <span className="np-lv">Lv.50</span>
              </div>
              <HPBar current={hpB} max={maxB} accent={accentB} side="right"/>
              <div className="np-types">
                {b.types.map(ty => {
                  const c = window.TYPE_COLORS[ty];
                  return <span key={ty} style={{background:`${c}22`,border:`1px solid ${c}55`,color:c}}>{ty}</span>;
                })}
              </div>
            </div>
            <div className="sprite-wrap">
              <div className="shadow"/>
              <img src={b.sprite} alt={b.name} onError={(e)=>{e.target.src=b.spriteSmall}}/>
            </div>
          </div>

          {/* Player (A) — bottom left */}
          <div className={"fighter player " + (shakeA?"shake ":"") + (flashA?"flash ":"") + (lungeA?"lunge ":"")} style={{"--accent": accentA}}>
            <div className="sprite-wrap">
              <div className="shadow"/>
              <img src={a.sprite} alt={a.name} onError={(e)=>{e.target.src=a.spriteSmall}}/>
            </div>
            <div className="name-plate player-plate">
              <div className="np-top">
                <span className="np-name">{a.name}</span>
                <span className="np-lv">Lv.50</span>
              </div>
              <HPBar current={hpA} max={maxA} accent={accentA} side="left"/>
              <div className="np-types">
                {a.types.map(ty => {
                  const c = window.TYPE_COLORS[ty];
                  return <span key={ty} style={{background:`${c}22`,border:`1px solid ${c}55`,color:c}}>{ty}</span>;
                })}
              </div>
            </div>
          </div>

          {/* Projectile (type-colored bolt) */}
          {projectile && (
            <div className={"projectile from-"+projectile.from} style={{"--pc": projectile.color}}>
              <div className="p-core"/>
              <div className="p-trail"/>
              <div className="p-glow"/>
            </div>
          )}

          {/* Impact burst */}
          {impact && (
            <div className={"impact side-"+impact.side + " k-"+impact.kind} style={{"--ic": impact.color}}>
              <div className="imp-ring"/>
              <div className="imp-ring imp-ring-2"/>
              <div className="imp-star">✦</div>
              <div className="imp-spikes">
                <span/><span/><span/><span/><span/><span/><span/><span/>
              </div>
            </div>
          )}

          {/* Damage popup */}
          {dmgPop && (
            <div key={dmgPop.id}
              className={"dmg-pop side-"+dmgPop.side + (dmgPop.crit?" crit":"") + (dmgPop.eff>1?" super":dmgPop.eff<1&&dmgPop.eff>0?" weak":"")}>
              <span className="dp-num">-{dmgPop.value}</span>
              {dmgPop.crit && <span className="dp-crit">CRIT!</span>}
            </div>
          )}

          {winner && (
            <div className="victory">
              <div className="victory-inner" style={{"--accent": window.TYPE_COLORS[winner.types[0]] || "#6ae0ff"}}>
                <div className="v-kicker">◆ {lang==="es"?"VICTORIA":"VICTORY"} ◆</div>
                <img src={winner.sprite} alt={winner.name} onError={(e)=>{e.target.src=winner.spriteSmall}}/>
                <div className="v-name">{winner.name}</div>
                <div className="v-xp">+{Math.floor((winner===a?b.base_experience:a.base_experience)||120)} EXP</div>
                <button className="v-again" onClick={()=>{
                  setHpA(maxA); setHpB(maxB); setLog([]); setWinner(null); setTurn("player");
                  pushLog(lang==="es"?"¡Revancha!":"Rematch!", "start");
                }}>{lang==="es"?"↻ REVANCHA":"↻ REMATCH"}</button>
              </div>
            </div>
          )}
        </div>

        {/* Bottom console */}
        <div className="console">
          <div className="log" ref={logRef}>
            {log.map(l => (
              <div key={l.id} className={"log-line k-"+l.kind}>{l.text}</div>
            ))}
          </div>
          <div className="moves-panel">
            <div className="mp-title">
              {turn === "player" && `${lang==="es"?"¿Qué hará":"What will"} ${a.name.toUpperCase()} ${lang==="es"?"":"do?"}`}
              {turn === "busy" && `${lang==="es"?"…":"…"}`}
              {turn === "enemy" && `${b.name.toUpperCase()} ${lang==="es"?"ataca":"attacks"}…`}
              {turn === "over" && (lang==="es"?"FIN DE BATALLA":"BATTLE OVER")}
            </div>
            <div className="move-grid">
              {movesA.map((m, i) => {
                const c = window.TYPE_COLORS[m.type];
                const disabled = turn !== "player";
                return (
                  <button key={i} className="move-btn" disabled={disabled}
                    onClick={()=>playerAttack(m)}
                    style={{"--mc": c}}>
                    <div className="mb-top">
                      <span className="mb-name">{m.name.replace(/-/g," ")}</span>
                      <span className="mb-type" style={{background:`${c}22`,color:c,border:`1px solid ${c}55`}}>{m.type}</span>
                    </div>
                    <div className="mb-bot">
                      <span>PWR {m.power}</span>
                      <span>ACC {m.accuracy}</span>
                      <span className="mb-cat">{m.category==="physical"?"◆ FÍS":"◇ ESP"}</span>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

window.BattleArena = BattleArena;

</script>
<script type="text/babel">
// Compare two Pokémon side by side
const { useState: useStateC, useMemo: useMemoC } = React;

function CompareSlot({ slot, value, onChange, allPokemon, lang }){
  const t = window.I18N[lang];
  const [q, setQ] = useStateC("");

  const suggestions = useMemoC(() => {
    if (!q) return [];
    const needle = q.toLowerCase();
    return allPokemon
      .filter(p => p.name.includes(needle) || String(p.id).padStart(3,"0").includes(needle))
      .slice(0, 6);
  }, [q, allPokemon]);

  if (!value){
    return (
      <div className="slot empty" style={{position:"relative"}}>
        <div style={{textAlign:"center"}}>
          <div style={{marginBottom:14,fontSize:28,color:"var(--ink-faint)"}}>◇</div>
          <div>{t.selectPokemon} — {slot}</div>
        </div>
        <div className="picker" style={{marginTop:16}}>
          <input
            placeholder={t.searchPlaceholder}
            value={q}
            onChange={(e)=>setQ(e.target.value)}
          />
        </div>
        {suggestions.length > 0 && (
          <div style={{
            marginTop:6, width:"100%", maxWidth:280,
            border:"1px solid var(--stroke)", borderRadius:10,
            background:"var(--bg-1)", overflow:"hidden"
          }}>
            {suggestions.map(s => (
              <div key={s.id}
                onClick={()=>{ onChange(s); setQ(""); }}
                style={{
                  display:"flex", alignItems:"center", gap:10,
                  padding:"8px 12px", cursor:"pointer",
                  borderBottom:"1px solid var(--stroke)"
                }}
                onMouseOver={(e)=>e.currentTarget.style.background="rgba(106,224,255,0.08)"}
                onMouseOut={(e)=>e.currentTarget.style.background="transparent"}>
                <img src={s.spriteSmall} style={{width:36,height:36}} alt=""/>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"Space Grotesk",textTransform:"capitalize"}}>{s.name}</div>
                  <div style={{fontFamily:"JetBrains Mono",fontSize:10,color:"var(--ink-faint)",letterSpacing:"0.15em"}}>№ {String(s.id).padStart(3,"0")}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  const accent = window.TYPE_COLORS[value.types[0]] || "#6ae0ff";
  return (
    <div className="slot" style={{"--card-accent": accent}}>
      <div className="picker">
        <span>№ {String(value.id).padStart(3,"0")}</span>
        <button onClick={()=>onChange(null)} style={{
          fontFamily:"JetBrains Mono", fontSize:10,letterSpacing:"0.2em",
          color:"var(--ink-faint)", padding:"4px 8px", border:"1px solid var(--stroke)",
          borderRadius:6
        }}>× CHANGE</button>
      </div>
      <div className="art">
        <div className="glow"/>
        <img src={value.sprite} alt={value.name} onError={(e)=>{e.target.src=value.spriteSmall}}/>
      </div>
      <h3>{value.name}</h3>
      <div className="types">
        {value.types.map(ty => {
          const c = window.TYPE_COLORS[ty];
          return <span key={ty} className="t" style={{
            padding:"4px 10px", borderRadius:6,
            fontFamily:"JetBrains Mono", fontSize:10, letterSpacing:"0.18em", textTransform:"uppercase",
            background:`${c}22`, border:`1px solid ${c}55`, color:c
          }}>{ty}</span>;
        })}
      </div>
      <div className="mini-stats">
        <window.HexRadar stats={value.stats} accent={accent} labels={window.I18N[lang]}/>
      </div>
    </div>
  );
}

function CompareView({ allPokemon, lang }){
  const [a, setA] = useStateC(null);
  const [b, setB] = useStateC(null);
  const [fighting, setFighting] = useStateC(false);

  // Determine winner per stat
  const statKeys = ["hp","attack","defense","special-attack","special-defense","speed"];
  const labels = window.I18N[lang];

  return (
    <div>
      <div className="compare">
        <CompareSlot slot="A" value={a} onChange={setA} allPokemon={allPokemon} lang={lang}/>
        <div className="vs">VS</div>
        <CompareSlot slot="B" value={b} onChange={setB} allPokemon={allPokemon} lang={lang}/>
      </div>

      {a && b && (
        <div className="fight-cta">
          <button className="fight-btn" onClick={()=>setFighting(true)}>
            <span className="fb-icon">⚔</span>
            {lang==="es" ? "¡LUCHAR!" : "FIGHT!"}
          </button>
        </div>
      )}

      {fighting && a && b && (
        <window.BattleArena a={a} b={b} lang={lang} onClose={()=>setFighting(false)}/>
      )}

      {a && b && (
        <div style={{
          marginTop:20,padding:22,
          border:"1px solid var(--stroke)",borderRadius:18,background:"var(--panel)"
        }}>
          <div className="section-title">{labels.stats}</div>
          <div style={{display:"grid",gap:10}}>
            {statKeys.map(k => {
              const lblMap = {"hp":labels.hp,"attack":labels.atk,"defense":labels.def,"special-attack":labels.spa,"special-defense":labels.spd,"speed":labels.spe};
              const va = a.stats[k], vb = b.stats[k];
              const max = Math.max(va, vb, 1);
              const pctA = (va/max)*100, pctB = (vb/max)*100;
              const winA = va > vb, winB = vb > va;
              const cA = window.TYPE_COLORS[a.types[0]]||"#6ae0ff";
              const cB = window.TYPE_COLORS[b.types[0]]||"#ff4da6";
              return (
                <div key={k} style={{display:"grid",gridTemplateColumns:"1fr 120px 1fr",alignItems:"center",gap:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"flex-end"}}>
                    <div style={{flex:1,height:10,background:"rgba(255,255,255,0.04)",borderRadius:6,overflow:"hidden",position:"relative"}}>
                      <div style={{
                        position:"absolute",right:0,top:0,bottom:0,width:pctA+"%",
                        background:`linear-gradient(270deg, ${cA}, ${cA}55)`,
                        boxShadow: winA ? `0 0 12px -2px ${cA}` : "none",
                        transition:"width 1s cubic-bezier(.2,.8,.2,1)"
                      }}/>
                    </div>
                    <span style={{
                      fontFamily:"Space Grotesk",fontWeight:700,fontSize:16,minWidth:36,textAlign:"right",
                      color: winA ? cA : "var(--ink-dim)"
                    }}>{va}</span>
                  </div>
                  <div style={{textAlign:"center",fontFamily:"JetBrains Mono",fontSize:10,letterSpacing:"0.2em",color:"var(--ink-dim)",textTransform:"uppercase"}}>{lblMap[k]}</div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{
                      fontFamily:"Space Grotesk",fontWeight:700,fontSize:16,minWidth:36,
                      color: winB ? cB : "var(--ink-dim)"
                    }}>{vb}</span>
                    <div style={{flex:1,height:10,background:"rgba(255,255,255,0.04)",borderRadius:6,overflow:"hidden",position:"relative"}}>
                      <div style={{
                        position:"absolute",left:0,top:0,bottom:0,width:pctB+"%",
                        background:`linear-gradient(90deg, ${cB}, ${cB}55)`,
                        boxShadow: winB ? `0 0 12px -2px ${cB}` : "none",
                        transition:"width 1s cubic-bezier(.2,.8,.2,1)"
                      }}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

window.CompareView = CompareView;

</script>
<script type="text/babel">
// Tweaks panel — theme, density, scanlines, particles
const { useState: useStateT, useEffect: useEffectT } = React;

function TweaksPanel({ tweaks, setTweaks, lang, visible, onClose }){
  const t = window.I18N[lang];
  if (!visible) return null;
  const set = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({type:"__edit_mode_set_keys", edits: patch}, "*");
  };
  return (
    <div className="tweaks-panel">
      <h4>{t.tweaks}</h4>
      <div className="row">
        <label>{t.theme}</label>
        <div className="seg">
          {[["rpg",t.themeRpg],["arcade",t.themeArcade],["holo",t.themeHolo]].map(([v,lbl])=>(
            <button key={v} className={tweaks.theme===v?"on":""} onClick={()=>set({theme:v})}>{lbl}</button>
          ))}
        </div>
      </div>
      <div className="row">
        <label>{t.density}</label>
        <div className="seg">
          {[["comfortable",t.denseComf],["compact",t.denseComp],["dense",t.denseDense]].map(([v,lbl])=>(
            <button key={v} className={tweaks.density===v?"on":""} onClick={()=>set({density:v})}>{lbl}</button>
          ))}
        </div>
      </div>
      <div className={"tog " + (tweaks.showScanlines?"on":"")} onClick={()=>set({showScanlines:!tweaks.showScanlines})}>
        <span>{t.scanlines}</span><div className="sw"/>
      </div>
      <div className={"tog " + (tweaks.particles?"on":"")} onClick={()=>set({particles:!tweaks.particles})}>
        <span>{t.particles}</span><div className="sw"/>
      </div>
    </div>
  );
}

window.TweaksPanel = TweaksPanel;

</script>
<script type="text/babel">
// Main app: layout, state, data fetch, filters, search, grid + detail + compare
const { useState, useEffect, useMemo, useRef } = React;

function Particles(){
  const ref = useRef(null);
  useEffect(()=>{
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    let w, h, parts = [];
    const resize = () => {
      w = c.width = window.innerWidth;
      h = c.height = window.innerHeight;
    };
    resize();
    window.addEventListener("resize", resize);
    parts = Array.from({length: 40}, () => ({
      x: Math.random()*w, y: Math.random()*h,
      vx: (Math.random()-0.5)*0.15, vy: -0.15 - Math.random()*0.3,
      r: Math.random()*1.5+0.3, a: Math.random()*0.4+0.1
    }));
    let raf;
    const tick = () => {
      ctx.clearRect(0,0,w,h);
      parts.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -5) { p.y = h+5; p.x = Math.random()*w; }
        ctx.beginPath();
        ctx.fillStyle = `rgba(106,224,255,${p.a})`;
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
      });
      raf = requestAnimationFrame(tick);
    };
    tick();
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener("resize",resize); };
  }, []);
  return <canvas ref={ref} style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",opacity:0.6}}/>;
}

function App(){
  const [lang, setLang] = useState("es");
  const [tab, setTab] = useState("explore");
  const [tweaks, setTweaks] = useState(window.__TWEAKS__ || {theme:"rpg",density:"comfortable",showScanlines:true,particles:true});
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const [pokemon, setPokemon] = useState([]);
  const [loadProgress, setLoadProgress] = useState(0);
  const [query, setQuery] = useState("");
  const [selectedTypes, setSelectedTypes] = useState([]);
  const [sortBy, setSortBy] = useState("id");
  const [detail, setDetail] = useState(null);
  const [featuredIdx, setFeaturedIdx] = useState(0);

  const t = window.I18N[lang];

  // Theme class on body
  useEffect(()=>{
    document.body.className = "theme-" + tweaks.theme + (tweaks.showScanlines ? " scanlines":"");
  }, [tweaks.theme, tweaks.showScanlines]);

  // Tweaks protocol
  useEffect(()=>{
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({type:"__edit_mode_available"}, "*");
    return ()=>window.removeEventListener("message", onMsg);
  }, []);

  // Load 151
  useEffect(()=>{
    let cancelled = false;
    const ids = Array.from({length:151}, (_,i)=>i+1);
    window.PokeAPI.loadBatch(ids, 12, (done, total)=>{
      if (!cancelled) setLoadProgress(Math.round(done/total*100));
    }).then(list => {
      if (!cancelled) {
        list.sort((a,b)=>a.id-b.id);
        setPokemon(list);
      }
    });
    return ()=>{ cancelled = true; };
  }, []);

  // Featured hero rotation
  useEffect(()=>{
    if (pokemon.length === 0) return;
    // Pick interesting ones (starters and legendaries)
    const interesting = pokemon.filter(p => [6,9,3,25,150,149,151,130,94,65].includes(p.id));
    const pool = interesting.length > 0 ? interesting : pokemon;
    const iv = setInterval(()=>{
      setFeaturedIdx(i => (i+1) % pool.length);
    }, 5000);
    return ()=>clearInterval(iv);
  }, [pokemon.length]);

  const featuredPool = useMemo(()=>{
    const interesting = pokemon.filter(p => [6,9,3,25,150,149,151,130,94,65].includes(p.id));
    return interesting.length > 0 ? interesting : pokemon;
  }, [pokemon]);
  const featured = featuredPool[featuredIdx % (featuredPool.length || 1)];

  // Filter and sort
  const filtered = useMemo(()=>{
    let list = pokemon;
    if (query){
      const q = query.toLowerCase().trim();
      list = list.filter(p =>
        p.name.includes(q) || String(p.id).padStart(3,"0").includes(q) || String(p.id) === q
      );
    }
    if (selectedTypes.length > 0){
      list = list.filter(p => selectedTypes.some(t => p.types.includes(t)));
    }
    const sorters = {
      id: (a,b)=>a.id-b.id,
      name: (a,b)=>a.name.localeCompare(b.name),
      hp: (a,b)=>b.stats.hp-a.stats.hp,
      atk: (a,b)=>b.stats.attack-a.stats.attack,
    };
    list = [...list].sort(sorters[sortBy]);
    return list;
  }, [pokemon, query, selectedTypes, sortBy]);

  const availableTypes = useMemo(()=>{
    const set = new Set();
    pokemon.forEach(p => p.types.forEach(t => set.add(t)));
    return window.TYPE_ORDER.filter(t => set.has(t));
  }, [pokemon]);

  const toggleType = (t) => {
    setSelectedTypes(prev => prev.includes(t) ? prev.filter(x=>x!==t) : [...prev, t]);
  };

  return (
    <div className="app">
      {tweaks.particles && <Particles/>}

      {/* Top bar */}
      <div className="topbar">
        <div className="logo">
          <div className="dot"/>
          <div>
            <div className="word">POKÉDEX · ARENA</div>
            <div className="sub">RPG EXPLORER v1.0</div>
          </div>
        </div>
        <div className="sep"/>
        <div className="nav">
          <button className={tab==="explore"?"on":""} onClick={()=>setTab("explore")}>◆ {t.tabExplore}</button>
          <button className={tab==="compare"?"on":""} onClick={()=>setTab("compare")}>⇋ {t.tabCompare}</button>
        </div>
        <div className="spacer"/>
        <div className="lang">
          <div className={"segment "+(lang==="es"?"on":"")} onClick={()=>setLang("es")}>ES</div>
          <div className={"segment "+(lang==="en"?"on":"")} onClick={()=>setLang("en")}>EN</div>
        </div>
      </div>

      {tab === "explore" && (
        <>
          {/* Hero */}
          <div className="hero">
            <div className="hud-corners"><span className="c2"/><span className="c3"/></div>
            <div className="hero-left">
              <div>
                <div className="hero-kicker"><span className="pulse"/>{t.tagline}</div>
                <h1>{t.title1} <span className="grad">{t.title2}</span> {t.title3}</h1>
                <p className="lead">{t.lead}</p>
              </div>
              <div className="hero-stats">
                <div className="chip"><span>{t.statLoaded}</span><b>{pokemon.length}/151</b></div>
                <div className="chip"><span>{t.statTypes}</span><b>{availableTypes.length}</b></div>
                <div className="chip"><span>{t.statViewed}</span><b>{filtered.length}</b></div>
              </div>
            </div>
            <div className="hero-right">
              <div className="hero-feature">
                <div className="rings">
                  <div className="ring r3"/>
                  <div className="ring r2"/>
                  <div className="ring r1"/>
                </div>
                <div className="glow" style={{
                  background: featured ? `radial-gradient(circle, ${window.TYPE_COLORS[featured.types[0]]}66, transparent 60%)` : undefined
                }}/>
                {featured && <img src={featured.sprite} alt={featured.name}
                  onError={(e)=>{e.target.src = featured.spriteSmall}}
                  onClick={()=>setDetail(featured)}
                  style={{cursor:"pointer"}}/>}
                {featured && (
                  <div className="info">
                    <div className="no">№ {String(featured.id).padStart(3,"0")} · {t.featured}</div>
                    <div className="nm">{featured.name}</div>
                  </div>
                )}
                <div className="cycle">
                  <button onClick={()=>setFeaturedIdx(i=>(i-1+featuredPool.length)%featuredPool.length)}>‹</button>
                  <button onClick={()=>setFeaturedIdx(i=>(i+1)%featuredPool.length)}>›</button>
                </div>
              </div>
            </div>
          </div>

          {/* Controls */}
          <div className="controls">
            <div className="search">
              <svg className="icon" viewBox="0 0 20 20" fill="none">
                <circle cx="9" cy="9" r="6" stroke="currentColor" strokeWidth="1.6"/>
                <path d="M14 14L18 18" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
              </svg>
              <input placeholder={t.searchPlaceholder} value={query} onChange={(e)=>setQuery(e.target.value)}/>
              <span className="kbd">ESC</span>
            </div>
            <div className="type-filters">
              <button className={"type-chip "+(selectedTypes.length===0?"on":"")}
                onClick={()=>setSelectedTypes([])}
                style={selectedTypes.length===0 ? {color:"var(--accent)"} : {}}>
                ✦ {t.allTypes}
              </button>
              {availableTypes.map(tp => {
                const c = window.TYPE_COLORS[tp];
                const on = selectedTypes.includes(tp);
                return (
                  <button key={tp} className={"type-chip "+(on?"on":"")}
                    onClick={()=>toggleType(tp)}
                    style={on ? {color:c, background:`${c}14`} : {}}>
                    <span className="sw" style={{background:c}}/>
                    {tp}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Grid meta */}
          <div className="grid-meta">
            <div className="count">
              {pokemon.length < 151
                ? `${t.loading} · ${loadProgress}%`
                : `${filtered.length} ${t.resultsOf} ${pokemon.length} ${t.resultsPokemon}`}
            </div>
            <div className="sort">
              {[["id",t.sortNo],["name",t.sortName],["hp",t.sortHp],["atk",t.sortAtk]].map(([v,lbl])=>(
                <button key={v} className={sortBy===v?"on":""} onClick={()=>setSortBy(v)}>↕ {lbl}</button>
              ))}
            </div>
          </div>

          {/* Grid */}
          {filtered.length === 0 && pokemon.length > 0 ? (
            <div style={{
              textAlign:"center",padding:"60px 20px",
              fontFamily:"JetBrains Mono",color:"var(--ink-faint)",letterSpacing:"0.2em",textTransform:"uppercase",fontSize:12
            }}>{t.noResults}</div>
          ) : (
            <div className={"grid " + tweaks.density}>
              {filtered.map(p => (
                <window.PokeCard key={p.id} p={p} onClick={()=>setDetail(p)}/>
              ))}
              {pokemon.length < 151 && Array.from({length: 12}).map((_,i) => (
                <div key={"sk"+i} className="skeleton"/>
              ))}
            </div>
          )}
        </>
      )}

      {tab === "compare" && (
        <div style={{marginTop:22}}>
          <div style={{
            border:"1px solid var(--stroke)",borderRadius:18,padding:"28px 32px",
            background:"var(--panel)",marginBottom:20
          }}>
            <div className="hero-kicker"><span className="pulse"/>{t.tabCompare.toUpperCase()} · VS MODE</div>
            <h2 style={{fontFamily:"Space Grotesk",fontSize:36,margin:"10px 0 0",letterSpacing:"-0.02em"}}>
              {lang==="es" ? "Enfrenta dos Pokémon y analiza sus atributos" : "Pit two Pokémon against each other"}
            </h2>
          </div>
          <window.CompareView allPokemon={pokemon} lang={lang}/>
        </div>
      )}

      {detail && <window.DetailModal p={detail} onClose={()=>setDetail(null)}
        onPick={(id)=>{
          const found = pokemon.find(x=>x.id===id);
          if (found) setDetail(found);
        }} lang={lang}/>}

      <button className={"tweaks-btn " + (!tweaksOpen ? "visible":"")} onClick={()=>setTweaksOpen(true)}>
        ⚙ {t.tweaks}
      </button>
      <window.TweaksPanel tweaks={tweaks} setTweaks={setTweaks} lang={lang}
        visible={tweaksOpen} onClose={()=>setTweaksOpen(false)}/>
      {tweaksOpen && (
        <div style={{position:"fixed",inset:0,zIndex:60}} onClick={()=>setTweaksOpen(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
